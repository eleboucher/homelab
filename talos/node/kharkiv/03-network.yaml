apiVersion: v1alpha1
kind: LinkAliasConfig
name: lan0
selector:
  match: mac(link.permanent_addr) == "38:05:25:35:3b:9a"
---
apiVersion: v1alpha1
kind: LinkAliasConfig
name: lan1
selector:
  match: mac(link.permanent_addr) == "38:05:25:35:3b:9b"
---
apiVersion: v1alpha1
kind: BondConfig
name: lacp0
mtu: 9000
links:
  - lan0
  - lan1
bondMode: 802.3ad
lacpRate: fast
xmitHashPolicy: layer3+4
miimon: 100
