machine:
  kernel:
    modules:
      - name: dm_thin_pool # homefs lvmthin backend
      - name: drbd # homefs replication
        parameters:
          - usermode_helper=disabled # required on Talos (no usermodehelper)
      - name: drbd_transport_tcp
      - name: nbd
      - name: nfsd
      - name: zfs
