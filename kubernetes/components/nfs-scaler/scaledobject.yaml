---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/keda.sh/scaledobject_v1alpha1.json
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ${APP}
spec:
  advanced:
    restoreToOriginalReplicaCount: true
  cooldownPeriod: 60
  minReplicaCount: 0
  maxReplicaCount: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${APP}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428
        query: kube_deployment_status_replicas_available{namespace="nfs", deployment="nfs-server"}
        threshold: "1"
        ignoreNullValues: "1"
