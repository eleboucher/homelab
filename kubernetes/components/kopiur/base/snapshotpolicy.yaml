---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/snapshotpolicy_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: "${APP}"
  annotations:
    kopiur.home-operations.com/allow-identity-change: "true"
spec:
  copyMethod: Snapshot
  credentialProjection:
    enabled: true
  files:
    ignoreRules:
      - lost+found
  repository:
    kind: ClusterRepository
    name: ${KOPIUR_REPOSITORY:=nas}
  retention:
    keepHourly: 24
    keepDaily: 7
  sources:
    - pvc:
        name: ${KOPIUR_PVC:=${APP}}
  volumeSnapshotClassName: ${KOPIUR_SNAPSHOTCLASS:=openebs-snapshots}
