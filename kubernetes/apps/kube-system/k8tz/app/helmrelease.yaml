---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8tz
spec:
  chartRef:
    kind: OCIRepository
    name: k8tz
  interval: 30m
  postRenderers:
    - kustomize:
        patches:
          # Skip kubernetes e2e test namespaces: the injected subPath
          # mount makes the framework's ephemeral-container retests
          # invalid (subPath is forbidden on ephemeral containers).
          - target:
              kind: MutatingWebhookConfiguration
              name: k8tz
            patch: |
              - op: add
                path: /webhooks/0/namespaceSelector/matchExpressions/-
                value:
                  key: e2e-framework
                  operator: DoesNotExist
  values:
    namespace: null
    createNamespace: false
    replicaCount: 2
    timezone: Europe/Paris
    cronJobTimeZone: true
    webhook:
      certManager:
        enabled: true
        issuerRef:
          name: k8tz-webhook-issuer
          kind: Issuer
