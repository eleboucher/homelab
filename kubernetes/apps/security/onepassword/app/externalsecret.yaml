---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: onepassword-credentials-secret
    template:
      data:
        OP_SESSION: '{{ .OP_CREDENTIALS }}'
  dataFrom:
    - extract:
        key: 1password
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: onepassword-vault-secret
    template:
      data:
        OP_CONNECT_TOKEN: '{{ .OP_CONNECT_TOKEN }}'
  dataFrom:
    - extract:
        key: 1password
