---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword
spec:
  chartRef:
    kind: OCIRepository
    name: onepassword
  interval: 1h
  values:
    connect:
      annotations:
        reloader.stakater.com/auto: "true"
      api:
        httpPort: 8080
        imageRepository: ghcr.io/1password/connect-api
        serviceMonitor:
          enabled: true
      sync:
        imageRepository: ghcr.io/1password/connect-sync
  postRenderers:
    - # NOTE: Instead of having the credentials mounted as a file, we inject them as env vars from the secret.
      # This is because on bootstrap kustomize strips quotes around the JSON in stringData values, which makes
      # the value a JSON object instead of a string. Storing the credentials as an env var (via envFrom) keeps
      # the secret a flat key/value pair and avoids the issue.
      kustomize:
        patches:
          - target:
              kind: Deployment
              name: onepassword-connect
            patch: |-
              - op: remove
                path: /spec/template/spec/containers/0/env/0
              - op: remove
                path: /spec/template/spec/containers/1/env/1
              - op: add
                path: /spec/template/spec/containers/0/envFrom
                value:
                  - secretRef:
                      name: onepassword-credentials-secret
              - op: add
                path: /spec/template/spec/containers/1/envFrom
                value:
                  - secretRef:
                      name: onepassword-credentials-secret
              - op: remove
                path: /spec/template/spec/containers/0/volumeMounts/1
              - op: remove
                path: /spec/template/spec/containers/1/volumeMounts/1
              - op: remove
                path: /spec/template/spec/volumes/1
