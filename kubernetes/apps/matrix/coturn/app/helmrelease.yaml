---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coturn
spec:
  chartRef:
    kind: OCIRepository
    name: coturn
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      coturn:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=coturn/coturn
              repository: docker.io/coturn/coturn
              tag: 4.11.0
            args:
              - -c
              - /etc/coturn/turnserver.conf
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3478
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3478
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_BIND_SERVICE

    persistence:
      config:
        type: secret
        name: coturn
        globalMounts:
          - path: /etc/coturn/turnserver.conf
            subPath: turnserver.conf
            readOnly: true
      tls:
        type: secret
        name: turn-erwanleboucher-dev-tls
        globalMounts:
          - path: /etc/coturn/tls
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /var/tmp

    service:
      app:
        controller: coturn
        ports:
          turn-udp:
            port: 3478
            protocol: UDP
            primary: true
          turn-tcp:
            port: 3478
            protocol: TCP
          turns-udp:
            port: 5349
            protocol: UDP
          turns-tcp:
            port: 5349
            protocol: TCP
