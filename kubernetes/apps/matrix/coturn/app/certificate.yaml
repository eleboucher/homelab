---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: turn-erwanleboucher-dev
spec:
  dnsNames:
    - turn.erwanleboucher.dev
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  secretName: turn-erwanleboucher-dev-tls
  usages:
    - digital signature
    - key encipherment
    - server auth
