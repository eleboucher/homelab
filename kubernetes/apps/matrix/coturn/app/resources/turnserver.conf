listening-ip=0.0.0.0
listening-port=3478
tls-listening-port=5349

min-port=50201
max-port=50300

realm=turn.erwanleboucher.dev

use-auth-secret
static-auth-secret={{ .turn_secret }}

lt-cred-mech
user=livekit:{{ .livekit_turn_password }}

cert=/etc/coturn/tls/tls.crt
pkey=/etc/coturn/tls/tls.key

no-tlsv1
no-tlsv1_1

no-multicast-peers
no-loopback-peers
no-cli
fingerprint

log-file=stdout
no-stdout-log=false
