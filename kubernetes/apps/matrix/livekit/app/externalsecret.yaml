# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: livekit
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: livekit-config
    creationPolicy: Owner
    template:
      data:
        livekit.yaml: |
          port: 7880
          bind_addresses:
            - ""
          redis:
            address: dragonfly.database.svc.cluster.local:6379
            db: 5

          rtc:
            udp_port: 7882
            port_range_start: 50000
            port_range_end: 60000
            ips:
              includes:
                - 10.42.0.0/16
            stun_servers:
              - turn.erwanleboucher.dev:3478
            turn_servers:
              - host: turn.erwanleboucher.dev
                port: 5349
                protocol: tls
                secret: "{{ .SHARED_SECRET }}"
              - host: turn.erwanleboucher.dev
                port: 3478
                protocol: udp
                secret: "{{ .SHARED_SECRET }}"
            use_external_ip: false
            enable_loopback_candidate: false
          room:
            auto_create: false
          turn:
            enabled: false
          log_level: info
          keys:
            "{{ .api_key }}": "{{ .api_secret }}"
  dataFrom:
    - extract:
        key: livekit
    - extract:
        key: stunner
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: livekit-keys
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    template:
      data:
        LIVEKIT_KEY: "{{ .LIVEKIT_KEY }}"
        LIVEKIT_SECRET: "{{ .LIVEKIT_SECRET }}"
  dataFrom:
    - extract:
        key: livekit
