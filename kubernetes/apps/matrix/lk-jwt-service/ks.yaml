---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: lk-jwt-service
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: lk-jwt-service
  dependsOn:
    - name: continuwuity
  interval: 1h
  path: "./kubernetes/apps/matrix/lk-jwt-service/app"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: matrix
  timeout: 5m
  wait: false
