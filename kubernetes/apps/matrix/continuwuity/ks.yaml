---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: continuwuity
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: continuwuity
  components:
    - ../../../../components/kopiur/hot
    - ../../../../components/oidc
  dependsOn:
    - name: kopiur-repository
      namespace: kopiur-system
    - name: miroir
      namespace: miroir-system
    - name: kanidm
      namespace: security
  interval: 1h
  path: "./kubernetes/apps/matrix/continuwuity/app"
  postBuild:
    substitute:
      APP: continuwuity
      APP_NAMESPACE: matrix
      SUBDOMAIN: matrix
      OIDC_CALLBACK: /_continuwuity/oidc/complete
      OIDC_DISPLAY_NAME: Continuwuity
      OIDC_SHORT_USERNAME: "true"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: matrix
  timeout: 5m
  wait: false
