---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-configmap
data:
  openclaw.json: |-
    {
      agents: {
        defaults: {
          compaction: {
            memoryFlush: { enabled: true, softThresholdTokens: 6000 },
            mode: "safeguard",
            reserveTokensFloor: 8000,
            timeoutSeconds: 900,
          },
          contextPruning: { mode: "off" },
          compaction: { mode: "default", reserveTokensFloor: 30000, memoryFlush: { enabled: true, softThresholdTokens: 80000, prompt: "Extract key decisions, state changes, lessons, blockers to memory/YYYY-MM-DD.md. Format: ## [HH:MM] Topic. Skip routine work. NO_FLUSH if nothing important.", systemPrompt: "Compacting session context. Extract only what's worth remembering. No fluff." },
          },
          heartbeat: {
            directPolicy: "allow",
            lightContext: true,
            isolatedSession: true,
            includeReasoning: true,
          },
          imageModel: {
            primary: "litellm/gemma",
          },
          maxConcurrent: 4,
          memorySearch: {
            provider: "local",
            fallback: "none",
            local: {
              modelPath: "hf:ggml-org/embeddinggemma-300M-GGUF/embeddinggemma-300M-Q8_0.gguf",
            },
            sync: { watch: true },
            query: {
              hybrid: { enabled: true, vectorWeight: 0.7, textWeight: 0.3 },
            },
          },
          model: {
            primary: "litellm-anthropic/MiniMax-M3",
            fallbacks: [
              "litellm/qwen",
              "litellm/gemma",
            ],
          },
          models: {
            "litellm/gemma": { alias: "gemma" },
            "litellm/qwen": { alias: "qwen" },
            "litellm-anthropic/MiniMax-M3": { alias: "minimax", params: { cache_prompt: true } },
          },
          heartbeat: {
            every: "60m",
            model: "litellm-anthropic/MiniMax-M3",
            directPolicy: "allow",
            lightContext: true,
            isolatedSession: false,
            includeReasoning: false,
          },
          contextInjection: "always",
          bootstrapMaxChars: 50000,
          bootstrapTotalMaxChars: 100000,
          thinkingDefault: "high",
          timeoutSeconds: 600,
        },
        list: [
          {
            id: "main",
            default: true,
            name: "Owl",
            workspace: "/home/node/.openclaw/workspace",
            agentDir: "/home/node/.openclaw/agents/main/agent",
            identity: {
              name: "Owl",
              avatar: "avatars/owl_avatar.png",
            },
            heartbeat: {
              every: "60m",
              model: "litellm-anthropic/MiniMax-M3",
              activeHours: { start: "06:00", end: "23:00" },
            },
          },
        ],
      },
      bindings: [
        { agentId: "main", match: { channel: "discord", accountId: "default" } },
      ],
      channels: {
        discord: {
          enabled: true,
          defaultAccount: "default",
          groupPolicy: "open",
          accounts: {
            default: {
              token: "{{ .DISCORD_TOKEN }}",
              guilds: {
                "1441534507017703547": {
                  channels: {
                    "1501981764430594189": { enabled: true, requireMention: false },
                  },
                },
                "1503020857423822858": {
                  requireMention: false,
                },
              },
            },
          },
        },
      },
      commands: {
        native: "auto",
        nativeSkills: "auto",
        allowFrom: {
          discord: ["user:178154257042636800"],
        },
      },
      auth: {
        profiles: {
          "litellm:default": { provider: "litellm", mode: "api_key" },
        },
      },
      hooks: {
        internal: {
          enabled: true,
          entries: {
            "compaction-notifier": { enabled: true },
            "session-memory": { enabled: true },
          },
        },
      },

      models: {
        providers: {
          litellm: {
            api: "openai-responses",
            apiKey: "{{ .LITELLM_MASTER_KEY }}",
            baseUrl: "http://litellm.ai:4000/v1",
            request: { allowPrivateNetwork: true },
            models: [
              {
                id: "gemma",
                name: "Gemma 4 E4B",
                reasoning: false,
                input: ["text", "image"],
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                contextWindow: 131072,
                maxTokens: 8192,
                compat: { supportsUsageInStreaming: true },
              },
              {
                id: "qwen",
                name: "Qwen3.6 27B",
                reasoning: false,
                input: ["text"],
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                contextWindow: 32768,
                maxTokens: 8192,
                compat: { supportsUsageInStreaming: true },
              }
            ],
          },
          "litellm-anthropic": {
            baseUrl: "http://litellm.ai:4000",
            apiKey: "{{ .LITELLM_MASTER_KEY }}",
            api: "anthropic-messages",
            timeoutSeconds: 600,
            models: [
              { id: "MiniMax-M3", name: "MiniMax M3 via LiteLLM", reasoning: true, input: ["text", "image"], cost: { input: 15, output: 60, cacheRead: 2, cacheWrite: 10 }, contextWindow: 1000000, maxTokens: 32768, },
            ],
          },
        },
      },
      messages: {
        ackReactionScope: "group-mentions",
        responsePrefix: "[{model}]"
      },
      mcp: {
        servers: {
          homelab: {
            transport: "streamable-http",
            url: "http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp",
          },
          skiplagged: {
            transport: "streamable-http",
            url: "https://mcp.skiplagged.com/mcp",
          },
          kiwi: {
            transport: "streamable-http",
            url: "https://mcp.kiwi.com",
          },
          trivago: {
            transport: "streamable-http",
            url: "https://mcp.trivago.com/mcp",
          },
          ferryhopper: {
            transport: "streamable-http",
            url: "https://mcp.ferryhopper.com/mcp",
          },
          airbnb: {
            command: "npx",
            args: ["-y", "@openbnb/mcp-server-airbnb@latest", "--ignore-robots-txt"],
          },
        },
      },
      plugins: {
        entries: {
          browser: { enabled: true },
          discord: { enabled: true },
          "memory-core": { enabled: false },
          memini: {
            enabled: true,
            config: {
              base_url: "http://memini.ai.svc.cluster.local:8080",
              namespace: "openclaw",
              fallback_on_error: true,
              timeout_ms: 5000,
            },
          },
          "memory-wiki": {
            enabled: true,
            config: {
              vaultMode: "bridge",
              vault: {
                path: "/home/node/.openclaw/wiki/main",
                renderMode: "native",
              },
              bridge: {
                enabled: true,
                readMemoryArtifacts: true,
                indexDreamReports: true,
                indexDailyNotes: true,
                indexMemoryRoot: true,
                followMemoryEvents: true,
              },
              search: {
                backend: "shared",
                corpus: "all",
              },
              render: {
                preserveHumanBlocks: true,
                createBacklinks: true,
                createDashboards: true,
              },
            },
          },
          searxng: {
            enabled: true,
            config: {
              webSearch: {
                baseUrl: "http://searxng.selfhosted.svc.cluster.local:8080",
              },
            },
          },
          "skill-workshop": { enabled: true },
        },
        slots: {
          memory: "memini",
        },
      },
      session: {
        dmScope: "main",
        reset: {
          mode: "idle",
          idleMinutes: 1440,
        },
        maintenance: {
          mode: "enforce",
          pruneAfter: "7d",
          maxEntries: 1000,
          rotateBytes: "100mb",
          resetArchiveRetention: "7d",
        },
      },
      skills: {
        load: {
          extraDirs: [
            "/home/node/.openclaw/plugins/travel-hacking-toolkit/plugins/travel-hacking-toolkit/skills",
          ],
        },
      },
      tools: {
        alsoAllow: ["browser"],
        media: { image: { timeoutSeconds: 180 } },
        sessions: { visibility: "all" },
        agentToAgent: { enabled: true },
        exec: { security: "full", ask: "off", strictInlineEval: false },
        elevated: {
          enabled: true,
          allowFrom: {
            discord: ["178154257042636800"],
          },
        },
        web: {
          fetch: { enabled: true },
          search: { enabled: true, provider: "searxng" },
        },
      },
      gateway: {
        auth: { mode: "token", token: "{{ .GATEWAY_TOKEN }}" },
        bind: "lan",
        controlUi: {
          allowInsecureAuth: true,
          allowedOrigins: [
            "https://openclaw.erwanleboucher.dev",
            "https://chat.erwanleboucher.dev",
          ],
        },
        http: {
          endpoints: {
            chatCompletions: { enabled: true },
          },
        },
        mode: "local",
        nodes: {
          denyCommands: [
            "camera.snap",
            "camera.clip",
            "screen.record",
            "contacts.add",
            "calendar.add",
            "reminders.add",
            "sms.send",
            "sms.search",
          ],
        },
        port: 18789,
        reload: { debounceMs: 300, mode: "hybrid" },
        tailscale: { mode: "off", resetOnExit: false },
        trustedProxies: ["10.42.0.0/16", "192.168.0.0/16"],
      },
    }
