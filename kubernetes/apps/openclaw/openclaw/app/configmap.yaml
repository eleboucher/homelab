---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-configmap
data:
  openclaw.json: |-
    {
      agents: {
        defaults: {
          compaction: {
            memoryFlush: { enabled: true, softThresholdTokens: 6000 },
            mode: "safeguard",
            reserveTokensFloor: 8000,
            timeoutSeconds: 900,
          },
          contextPruning: {
            hardClear: { enabled: true, placeholder: "[Old tool result cleared]" },
            hardClearRatio: 0.5,
            keepLastAssistants: 3,
            minPrunableToolChars: 50000,
            mode: "cache-ttl",
            softTrim: { headChars: 1500, maxChars: 4000, tailChars: 1500 },
            softTrimRatio: 0.3,
            ttl: "1h",
          },
          heartbeat: {
            directPolicy: "allow",
            lightContext: true,
            isolatedSession: true,
            includeReasoning: true,
          },
          imageModel: {
            primary: "llamacpp/google/gemma-4-E4B-it",
          },
          maxConcurrent: 4,
          memorySearch: {
            provider: "local",
            fallback: "none",
            local: {
              modelPath: "hf:ggml-org/embeddinggemma-300M-GGUF/embeddinggemma-300M-Q8_0.gguf",
            },
            sync: { watch: true },
            query: {
              hybrid: { enabled: true, vectorWeight: 0.7, textWeight: 0.3 },
            },
          },
          model: {
            primary: "minimax/MiniMax-M2.7",
            fallbacks: [
              "llamacpp/qwen/qwen3.6-27B:general",
              "llamacpp/google/gemma-4-E4B-it",
            ],
          },
          models: {
            "llamacpp/google/gemma-4-E4B-it": { alias: "gemma" },
            "llamacpp/qwen/qwen3.6-27B:general": { alias: "qwen" },
            "minimax/MiniMax-M2.7": { alias: "minimax" },
          },
          subagents: {
            model: { primary: "minimax/MiniMax-M2.7" },
            archiveAfterMinutes: 120,
            maxConcurrent: 3,
            thinking: "medium",
          },
          thinkingDefault: "medium",
          timeoutSeconds: 600,
          workspace: "/home/node/.openclaw/workspace",
        },
        list: [
          {
            id: "main",
            default: true,
            name: "Owl",
            workspace: "/home/node/.openclaw/workspace",
            agentDir: "/home/node/.openclaw/agents/main/agent",
            identity: {
              name: "Owl",
              avatar: "avatars/owl_avatar.png",
            },
            heartbeat: {
              every: "60m",
              model: "minimax/MiniMax-M2.7",
              activeHours: { start: "06:00", end: "23:00" },
            },
          },
        ],
      },
      bindings: [
        { agentId: "main", match: { channel: "discord" } },
        { agentId: "main", match: { channel: "matrix" } },
      ],
      channels: {
        discord: {
          enabled: true,
          token: "{{ .DISCORD_TOKEN }}",
          dmPolicy: "pairing",
          dm: {
            enabled: true,
            allowFrom: ["178154257042636800"],
          },
          groupPolicy: "allowlist",
          guilds: {
            "1503020857423822858": {
              requireMention: false,
            },
          },
        },
        matrix: {
          enabled: false,
          accessToken: "{{ .MATRIX_ACCESS_TOKEN }}",
          autoJoin: "always",
          dm: {
            allowFrom: ["@genesixx:erwanleboucher.dev"],
            policy: "pairing",
            sessionScope: "per-room",
          },
          encryption: true,
          groupAllowFrom: ["@genesixx:erwanleboucher.dev"],
          groupPolicy: "allowlist",
          homeserver: "http://continuwuity.matrix.svc.cluster.local:8080",
          network: { dangerouslyAllowPrivateNetwork: true },
          userId: "{{ .MATRIX_USER_ID }}",
        },
      },
      commands: {
        native: "auto",
        nativeSkills: "auto",
        allowFrom: {
          discord: ["user:178154257042636800"],
          matrix: ["user:@genesixx:erwanleboucher.dev"],
        },
      },
      auth: {
        profiles: {
          "llamacpp:default": { provider: "llamacpp", mode: "api_key" },
          "minimax:default": { provider: "minimax", mode: "api_key" },
        },
      },
      hooks: {
        internal: {
          enabled: true,
          entries: {
            "compaction-notifier": { enabled: true },
            "session-memory": { enabled: true },
          },
        },
      },
      models: {
        mode: "merge",
        providers: {
          llamacpp: {
            api: "openai-responses",
            apiKey: "{{ .LLAMA_API_KEY }}",
            baseUrl: "http://llama-cpp.ai:8080/v1",
            models: [
              {
                id: "google/gemma-4-E4B-it",
                name: "Gemma 4 E4B",
                reasoning: false,
                input: ["text", "image"],
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                contextWindow: 131072,
                maxTokens: 8192,
                compat: { supportsUsageInStreaming: true },
              },
              {
                id: "qwen/qwen3.6-27B:general",
                name: "Qwen3.6 27B",
                reasoning: false,
                input: ["text"],
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                contextWindow: 32768,
                maxTokens: 8192,
                compat: { supportsUsageInStreaming: true },
              },
            ],
          },
          minimax: {
            api: "anthropic-messages",
            apiKey: "{{ .MINIMAX_API_KEY }}",
            baseUrl: "https://api.minimax.io/anthropic",
            models: [
              {
                id: "MiniMax-M2.7",
                name: "MiniMax M2.7",
                reasoning: true,
                input: ["text"],
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                contextWindow: 200000,
                maxTokens: 8192,
                compat: { supportsUsageInStreaming: true },
              },
            ],
          },
        },
      },
      messages: {
        groupChat: { visibleReplies: "automatic" },
      },
      mcp: {
        servers: {
          homelab: {
            transport: "streamable-http",
            url: "http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp",
          },
          skiplagged: {
            transport: "streamable-http",
            url: "https://mcp.skiplagged.com/mcp",
          },
          kiwi: {
            transport: "streamable-http",
            url: "https://mcp.kiwi.com",
          },
          trivago: {
            transport: "streamable-http",
            url: "https://mcp.trivago.com/mcp",
          },
          ferryhopper: {
            transport: "streamable-http",
            url: "https://mcp.ferryhopper.com/mcp",
          },
          airbnb: {
            command: "npx",
            args: ["-y", "@openbnb/mcp-server-airbnb@latest", "--ignore-robots-txt"],
          },
        },
      },
      plugins: {
        allow: [
          "agentmemory",
          "browser",
          "discord",
          "matrix",
          "memory-core",
          "memory-wiki",
          "searxng",
          "skill-workshop",
        ],
        bundledDiscovery: "compat",
        entries: {
          agentmemory: {
            enabled: true,
            config: {
              base_url: "http://agentmemory.ai.svc.cluster.local:3111",
              token_budget: 2000,
              min_confidence: 0.5,
              fallback_on_error: true,
              timeout_ms: 5000,
            },
          },
          browser: { enabled: true },
          discord: { enabled: true },
          "memory-core": { enabled: true },
          "memory-wiki": {
            enabled: true,
            config: {
              vaultMode: "bridge",
              vault: {
                path: "/home/node/.openclaw/wiki/main",
                renderMode: "native",
              },
              bridge: {
                enabled: true,
                readMemoryArtifacts: true,
                indexDreamReports: true,
                indexDailyNotes: true,
                indexMemoryRoot: true,
                followMemoryEvents: true,
              },
              search: {
                backend: "shared",
                corpus: "all",
              },
              render: {
                preserveHumanBlocks: true,
                createBacklinks: true,
                createDashboards: true,
              },
            },
          },
          searxng: {
            enabled: true,
            config: {
              webSearch: {
                baseUrl: "http://searxng.selfhosted.svc.cluster.local:8080",
              },
            },
          },
          "skill-workshop": { enabled: true },
        },
        slots: {
          memory: "agentmemory",
        },
      },
      session: {
        dmScope: "main",
        reset: {
          mode: "idle",
          idleMinutes: 1440,
        },
        maintenance: {
          mode: "enforce",
          pruneAfter: "7d",
          maxEntries: 1000,
          rotateBytes: "100mb",
          resetArchiveRetention: "7d",
        },
      },
      skills: {
        load: {
          extraDirs: [
            "/home/node/.openclaw/plugins/travel-hacking-toolkit/plugins/travel-hacking-toolkit/skills",
          ],
        },
      },
      tools: {
        alsoAllow: ["browser"],
        media: { image: { timeoutSeconds: 180 } },
        sessions: { visibility: "all" },
        agentToAgent: { enabled: true },
        exec: { security: "full", ask: "off", strictInlineEval: false },
        elevated: {
          enabled: true,
          allowFrom: {
            discord: ["178154257042636800"],
            matrix: ["@genesixx:erwanleboucher.dev"],
          },
        },
        web: {
          fetch: { enabled: true },
          search: { enabled: true, provider: "searxng" },
        },
      },
      gateway: {
        auth: { mode: "token", token: "{{ .GATEWAY_TOKEN }}" },
        bind: "lan",
        controlUi: {
          allowInsecureAuth: true,
          allowedOrigins: [
            "https://openclaw.erwanleboucher.dev",
            "https://chat.erwanleboucher.dev",
          ],
        },
        http: {
          endpoints: {
            chatCompletions: { enabled: true },
          },
        },
        mode: "local",
        nodes: {
          denyCommands: [
            "camera.snap",
            "camera.clip",
            "screen.record",
            "contacts.add",
            "calendar.add",
            "reminders.add",
            "sms.send",
            "sms.search",
          ],
        },
        port: 18789,
        reload: { debounceMs: 300, mode: "hybrid" },
        tailscale: { mode: "off", resetOnExit: false },
        trustedProxies: ["10.42.0.0/16", "192.168.0.0/16"],
      },
    }
