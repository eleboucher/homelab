---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-configmap
data:
  openclaw.json: |-
    {
      "gateway": {
        "auth": {
          "mode": "token",
          "token": "{{ .GATEWAY_TOKEN }}"
        },
        "bind": "lan",
        "controlUi": {
          "allowInsecureAuth": true,
          "allowedOrigins": ["https://openclaw.erwanleboucher.dev"]
        },
        "mode": "local",
        "nodes": {
          "denyCommands": [
            "camera.snap",
            "camera.clip",
            "screen.record",
            "contacts.add",
            "calendar.add",
            "reminders.add",
            "sms.send",
            "sms.search"
          ]
        },
        "http": {
          "endpoints": {
            "chatCompletions": {
              "enabled": true
            }
          }
        },
        "port": 18789,
        "reload": {
          "debounceMs": 300,
          "mode": "hybrid"
        },
        "tailscale": {
          "mode": "off",
          "resetOnExit": false
        },
        "trustedProxies": ["10.42.0.0/16"]
      },
      "agents": {
        "defaults": {
          "compaction": {
            "memoryFlush": {
              "enabled": true,
              "softThresholdTokens": 6000
            },
            "mode": "safeguard",
            "reserveTokensFloor": 8000,
            "timeoutSeconds": 900
          },
          "contextPruning": {
            "hardClear": {
              "enabled": true,
              "placeholder": "[Old tool result cleared]"
            },
            "hardClearRatio": 0.5,
            "keepLastAssistants": 3,
            "minPrunableToolChars": 50000,
            "mode": "cache-ttl",
            "softTrim": {
              "headChars": 1500,
              "maxChars": 4000,
              "tailChars": 1500
            },
            "softTrimRatio": 0.3,
            "ttl": "1h"
          },
          "maxConcurrent": 4,
          "model": {
            "primary": "litellm/gemma",
            "fallbacks": [
              "litellm/qwen"
            ]
          },
          "subagents": {
            "maxConcurrent": 8
          },
          "workspace": "/home/node/.openclaw/workspace"
        }
      },
      "channels": {
        "discord": {
          "enabled": true,
          "groupPolicy": "allowlist",
          "guilds": {
            "1441534507017703547": {
              "channels": {
                "1501981764430594189": {
                  "enabled": true
                }
              }
            }
          },
          "token": "{{ .DISCORD_TOKEN }}"
        },
        "matrix": {
          "accessToken": "{{ .MATRIX_ACCESS_TOKEN }}",
          "autoJoin": "always",
          "dm": {
            "allowFrom": ["@genesixx:erwanleboucher.dev"],
            "policy": "pairing",
            "sessionScope": "per-room"
          },
          "enabled": true,
          "encryption": true,
          "groupAllowFrom": ["@genesixx:erwanleboucher.dev"],
          "groupPolicy": "allowlist",
          "homeserver": "http://continuwuity.matrix.svc.cluster.local:8080",
          "network": {
            "dangerouslyAllowPrivateNetwork": true
          },
          "userId": "{{ .MATRIX_USER_ID }}"
        }
      },
      "commands": {
        "native": "auto",
        "nativeSkills": "auto"
      },
      "mcp": {
        "servers": {
          "homelab": {
            "transport": "streamable-http",
            "url": "http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp"
          }
        }
      },
      "auth": {
        "profiles": {
          "litellm:default": {
            "provider": "litellm",
            "mode": "api_key"
          }
        }
      },
      "hooks": {
        "internal": {
          "enabled": true,
          "entries": {
            "compaction-notifier": {
              "enabled": true
            },
            "session-memory": {
              "enabled": true
            }
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "litellm": {
            "api": "openai-responses",
            "apiKey": "{{ .LITELLM_MASTER_KEY }}",
            "baseUrl": "http://litellm.ai:4000/v1",
            "models": [
              {
                "id": "gemma",
                "name": "Gemma 4 E4B",
                "reasoning": false,
                "input": ["text", "image"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 131072,
                "maxTokens": 8192,
                "compat": {
                  "supportsUsageInStreaming": true
                }
              },
              {
                "id": "qwen",
                "name": "Qwen3.6 27B",
                "reasoning": false,
                "input": ["text"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 32768,
                "maxTokens": 8192,
                "compat": {
                  "supportsUsageInStreaming": true
                }
              }
            ]
          }
        }
      },
      "messages": {
        "groupChat": {
          "visibleReplies": "message_tool"
        }
      },
      "plugins": {
        "allow": [
          "memory-lancedb",
          "skill-workshop"
        ],
        "bundledDiscovery": "compat",
        "slots": {
          "memory": "memory-lancedb"
        },
        "entries": {
          "discord": {
            "enabled": true
          },
          "memory-lancedb": {
            "config": {
              "autoCapture": false,
              "autoRecall": true,
              "embedding": {
                "apiKey": "none",
                "baseUrl": "http://mcp-tools-embedding.ai.svc.cluster.local:8080",
                "dimensions": 384,
                "model": "sentence-transformers/all-MiniLM-L6-v2"
              }
            },
            "enabled": true
          },
          "searxng": {
            "config": {
              "webSearch": {
                "baseUrl": "http://searxng.selfhosted.svc.cluster.local:8080"
              }
            },
            "enabled": true
          },
          "skill-workshop": {
            "enabled": true
          }
        }
      },
      "session": {
        "dmScope": "per-channel-peer",
        "reset": {
          "idleMinutes": 120,
          "mode": "daily"
        }
      },
      "tools": {
        "profile": "coding",
        "web": {
          "fetch": {
            "enabled": true
          },
          "search": {
            "enabled": true,
            "provider": "searxng"
          }
        }
      }
    }
