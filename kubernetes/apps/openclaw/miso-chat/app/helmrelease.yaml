---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miso-chat
spec:
  chartRef:
    kind: OCIRepository
    name: miso-chat
  interval: 15m
  values:
    controllers:
      miso-chat:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/misospace/miso-chat
              tag: 0.4.12@sha256:625f29dd9b3d3c364ad0587af4943b13107c3d5910a11d832d64d361691286b9
            env:
              CORS_ORIGIN: "https://chat.erwanleboucher.dev"
              GATEWAY_DEVICE_IDENTITY_PATH: &devicePath /secrets/device.json
              GATEWAY_URL: "ws://openclaw.openclaw.svc.cluster.local:18789"
              OIDC_CALLBACK_URL: "https://chat.erwanleboucher.dev/auth/oidc/callback"
              OIDC_CLIENT_ID: miso-chat
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: kanidm-miso-chat-oidc
                    key: client-secret
              OIDC_ENABLED: "true"
              OIDC_ISSUER: "https://idm.erwanleboucher.dev/oauth2/openid/miso-chat"
              OIDC_PROVIDER_NAME: Kanidm
              OIDC_PROVIDER_URL: "https://idm.erwanleboucher.dev/oauth2/openid/miso-chat/.well-known/openid-configuration"
              REDIS_URL: "redis://dragonfly.database.svc:6379"
              SESSION_COOKIE_SAMESITE: none
              SESSION_COOKIE_SECURE: "true"
            envFrom:
              - secretRef:
                  name: miso-chat
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    persistence:
      device:
        type: secret
        name: miso-chat-device
        globalMounts:
          - path: *devicePath
            subPath: device.json
    route:
      app:
        hostnames:
          - chat.erwanleboucher.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        controller: miso-chat
        ports:
          http:
            port: 3000
