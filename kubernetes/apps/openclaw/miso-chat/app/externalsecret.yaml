---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miso-chat
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: miso-chat
    creationPolicy: Owner
    template:
      data:
        GATEWAY_AUTH_TOKEN: "{{ .GATEWAY_TOKEN }}"
        SESSION_SECRET: "{{ .SESSION_SECRET }}"
  dataFrom:
    - extract:
        key: miso-chat
    - extract:
        key: openclaw
---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: miso-chat-device
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: miso-chat-device
    creationPolicy: Owner
    template:
      data:
        # Generate via the miso-chat UI device pairing flow, store JSON in 1Password item "miso-chat" field "DEVICE_JSON"
        device.json: "{{ .DEVICE_JSON }}"
  dataFrom:
    - extract:
        key: miso-chat
