# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miroir
spec:
  chartRef:
    kind: OCIRepository
    name: miroir
  interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # 2-node cluster: no spare node can host a diskless tie-breaker.
    # Top-level key since chart 0.4.0 (was controller.autoTieBreaker).
    autoTieBreaker: false
    replicaCount: 2
    # Larger DRBD activity log cuts write amplification under the scattered
    # random writes of the DB/media workloads; must be a prime below 65534.
    drbd:
      alExtents: 6007
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
      podMonitor:
        enabled: true
      prometheusRule:
        enabled: true
