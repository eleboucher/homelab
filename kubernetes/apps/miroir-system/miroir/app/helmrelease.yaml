# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miroir
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: miroir
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    controller:
      autoTieBreaker: false
    image:
      # Pin to the release tag: the chart's rendered flags track tagged
      # releases, while :main drifts ahead and drops flags (e.g.
      # --overcommit-ratio) → controller/agent crashloop on usage.
      tag: 0.3.2
    nodes:
      kharkiv:
        backend: lvmthin
        device: /dev/disk/by-partlabel/r-homefs
      paris:
        backend: zfs
        zfsDataset: data-pool/homefs
    storageClass:
      create: true
      name: miroir-local
      isDefault: false
    replicatedStorageClass:
      create: true
      name: miroir-replicated
      isDefault: false
      quorum: last-man-standing
    volumeSnapshotClass:
      create: true
      name: miroir-snap
