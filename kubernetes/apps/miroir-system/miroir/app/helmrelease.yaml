# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miroir
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: miroir
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # 2-node cluster: no spare node can host a diskless tie-breaker.
    # Top-level key since chart 0.4.0 (was controller.autoTieBreaker).
    autoTieBreaker: false
    nodes:
      kharkiv:
        backend: lvmthin
        device: /dev/disk/by-partlabel/r-homefs
      paris:
        backend: zfs
        zfsDataset: data-pool/homefs
    storageClasses:
      - name: miroir-local
        replicas: 1
      - name: miroir-replicated
        replicas: 2
        quorum: last-man-standing
    volumeSnapshotClasses:
      - name: miroir-snap
