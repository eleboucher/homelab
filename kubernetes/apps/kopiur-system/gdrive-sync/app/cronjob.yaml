---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/batch/cronjob_v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopiur-sync-gdrive
spec:
  schedule: "0 4 * * *" # Daily at 4 AM (after the 12h snapshot schedules)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 36000 # 10 hours (gdrive blob enumeration alone takes ~3h; heavy runs exceed 6h)
      backoffLimit: 5
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: default
          securityContext:
            fsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            # perfectra1n/volsync bundles kopia + rclone; used here purely as a toolbox.
            - name: kopiur-sync
              image: ghcr.io/perfectra1n/volsync:v0.17.11
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e -o pipefail

                  export KOPIA_CACHE_DIRECTORY="${KOPIA_CACHE_DIR}"
                  export KOPIA_LOG_DIR="${KOPIA_CACHE_DIR}/logs"
                  export KOPIA_CHECK_FOR_UPDATES=false

                  echo "Connecting to source Kopia repository: filesystem:///repository"
                  kopia repository connect filesystem \
                    --path /repository \
                    --password "${KOPIA_PASSWORD}"

                  echo "Syncing to Google Drive: ${RCLONE_REMOTE_PATH}"
                  kopia repository sync-to rclone \
                    --remote-path "${RCLONE_REMOTE_PATH}" \
                    --parallel=4 \
                    --delete

                  echo "Disconnecting from Kopia repository"
                  kopia repository disconnect

                  echo "✅ Synchronization to Google Drive completed successfully"
              env:
                - name: KOPIA_CHECK_FOR_UPDATES
                  value: "false"
                - name: KOPIA_CACHE_DIR
                  value: /tmp/cache
                - name: HOME
                  value: /tmp
                - name: RCLONE_REMOTE_PATH
                  value: "gdrive:kopiur"
              envFrom:
                - secretRef:
                    name: kopiur-sync-secret
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                privileged: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
              volumeMounts:
                - name: repository
                  mountPath: /repository
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
                - name: rclone-config
                  mountPath: /config/rclone
                  readOnly: true
          volumes:
            - name: repository
              nfs:
                server: normandie.internal
                path: /backups/kopiur
            - name: tmp
              emptyDir: {}
            - name: rclone-config
              secret:
                secretName: google-drive-backup
