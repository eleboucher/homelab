# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: nas
spec:
  allowedNamespaces:
    all: true
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: normandie.internal
          path: /backups/kopiur
  credentialProjection:
    allowed: true
  encryption:
    passwordSecretRef:
      name: kopiur-nas-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  moverDefaults:
    podSecurityContext:
      fsGroup: 1000
    securityContext:
      runAsGroup: 1000
      runAsUser: 1000
  scheduleDefaults:
    timezone: Europe/Paris
