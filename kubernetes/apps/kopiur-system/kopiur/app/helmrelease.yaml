---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 1h
  values:
    controller:
      extraVolumes:
        - name: repo
          nfs:
            server: normandie.internal
            path: /backups/kopiur
      extraVolumeMounts:
        - name: repo
          mountPath: /repo
    grafanaDashboard:
      enabled: true
      grafanaOperator:
        enabled: true
        matchLabels:
          dashboards: grafana
    installScope: cluster
    metrics:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
      runAsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault
    secretProjection:
      enabled: true
    webhook:
      tls:
        mode: self
      serviceMonitor:
        enabled: true
