---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./grafanadashboard.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./prometheusrule-towonel-edge.yaml
  - ./prometheusrule-towonel-hub.yaml
# Preserve the /cache backup exclusion on the kopiur component's SnapshotPolicy.
patches:
  - target:
      kind: SnapshotPolicy
    patch: |
      - op: add
        path: /spec/files
        value:
          ignoreRules:
            - /cache
