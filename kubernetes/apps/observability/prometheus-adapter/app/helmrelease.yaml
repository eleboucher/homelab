---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-adapter
spec:
  chartRef:
    kind: OCIRepository
    name: prometheus-adapter
  interval: 30m
  timeout: 15m
  values:
    prometheus:
      url: http://vmsingle-victoria-metrics.observability.svc.cluster.local
      port: 8428
    rules:
      default: false
      external:
        - seriesQuery: '{__name__="probe_success"}'
          resources:
            namespaced: false
          name:
            as: probe_success
          metricsQuery: max_over_time(<<.Series>>{<<.LabelMatchers>>}[1m])
        - seriesQuery: '{__name__=~"envoy_route_requests_(log|cluster)"}'
          resources:
            namespaced: false
          name:
            matches: ^envoy_route_requests_.*$
            as: envoy_route_requests
          metricsQuery: |-
            max by (route_name) (envoy_route_requests_log{<<.LabelMatchers>>})
            or
            max by (route_name) (envoy_route_requests_cluster{<<.LabelMatchers>>})
