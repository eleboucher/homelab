---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: tempo-datasource
spec:
  datasource:
    access: proxy
    type: tempo
    name: Tempo
    url: http://tempo.observability.svc.cluster.local:3200
    jsonData:
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: VictoriaMetrics
      tracesToMetrics:
        datasourceUid: VictoriaMetrics
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
        tags:
          - key: service.name
            value: service
        queries:
          - name: Request rate
            query: sum by (span_name) (rate(traces_spanmetrics_calls_total{$__tags}[$__rate_interval]))
          - name: Error rate
            query: sum by (span_name) (rate(traces_spanmetrics_calls_total{$__tags, status_code="STATUS_CODE_ERROR"}[$__rate_interval]))
          - name: Duration p90
            query: histogram_quantile(0.9, sum by (le) (rate(traces_spanmetrics_latency_bucket{$__tags}[$__rate_interval])))
  instanceSelector:
    matchLabels:
      dashboards: grafana
