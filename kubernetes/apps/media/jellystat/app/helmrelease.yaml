# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellystat
spec:
  chartRef:
    kind: OCIRepository
    name: jellystat
  interval: 1h
  values:
    defaultPodOptions:
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      main:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository:  ghcr.io/cyfershepard/jellystat
              tag: 1.1.11
            env:
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: jellystat-postgres
                    key: username
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: jellystat-postgres
                    key: password
              POSTGRES_IP:
                valueFrom:
                  secretKeyRef:
                    name: jellystat-postgres
                    key: host
              POSTGRES_PORT: 5432
              POSTGRES_DB: jellystat
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: jellystat-secret
                    key: JWT_SECRET
            ports:
              - containerPort: 3000
                name: http
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /auth/isConfigured
                    port: http
              readiness: *probes
            resources:
              requests:
                memory: 160Mi
              limits:
                memory: 256Mi
            securityContext: &sec
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    route:
      app:
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - jellystat.erwanleboucher.dev

    service:
      main:
        controller: main
        ports:
          http:
            port: 80
            targetPort: 3000
