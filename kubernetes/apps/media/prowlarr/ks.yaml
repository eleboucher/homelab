---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prowlarr
  namespace: flux-system
spec:
  components:
    - ../../../../components/oidc/envoy
    - ../../../../components/kopiur/hot
    - ../../../../components/zeroscaler
  interval: 1h
  path: ./kubernetes/apps/media/prowlarr/app
  dependsOn:
    - name: envoy-gateway
      namespace: network
    - name: kanidm
      namespace: security
    - name: kopiur-repository
      namespace: kopiur-system
    - name: openebs
      namespace: openebs-system
  postBuild:
    substitute:
      APP: prowlarr
      APP_NAMESPACE: media
      OIDC_DISPLAY_NAME: Prowlarr
      OIDC_GROUP: admins
      OIDC_SCOPES: '["openid", "profile"]'
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
