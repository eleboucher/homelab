---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  components:
    - ../../../../components/gpu
    - ../../../../components/oidc
    - ../../../../components/kopiur/hot
    - ../../../../components/zeroscaler
  interval: 1h
  path: ./kubernetes/apps/media/jellyfin/app
  dependsOn:
    - name: envoy-gateway
      namespace: network
    - name: kopiur-repository
      namespace: kopiur-system
    - name: openebs
      namespace: openebs-system
  postBuild:
    substitute:
      APP: jellyfin
      APP_NAMESPACE: media
      KOPIUR_CAPACITY: 15Gi
      OIDC_DISPLAY_NAME: "Jellyfin"
      SUBDOMAIN: "watch"
      OIDC_CALLBACK: /sso/OID/redirect/kanidm
      OIDC_ORIGIN: /sso/OID/start/kanidm
      OIDC_SHORT_USERNAME: "true"
      OIDC_CLAIM_MAPS: |
        {
          "roles": {
            "joinType": "array",
            "valuesByGroup": {
              "users@idm.erwanleboucher.dev": ["user"],
              "admins@idm.erwanleboucher.dev": ["admin"]
            }
          }
        }
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  timeout: 5m
  wait: false
