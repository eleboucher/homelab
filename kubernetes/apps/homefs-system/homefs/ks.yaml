---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homefs
spec:
  interval: 1h
  path: ./kubernetes/apps/homefs-system/homefs/app
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: homefs-system
  wait: false
