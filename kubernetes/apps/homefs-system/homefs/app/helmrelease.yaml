# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homefs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: homefs
  values:
    image:
      tag: main@sha256:bf3c07c5508c9df84fd5a89a3c8b278ecca153d0d102af21996bb143c7453c7f
    nodes:
      kharkiv:
        backend: lvmthin
        device: /dev/disk/by-partlabel/r-homefs
      paris:
        backend: zfs
        zfsDataset: data-pool/homefs
    storageClass:
      create: true
      name: homefs-local
      isDefault: false
    replicatedStorageClass:
      create: true
      name: homefs-replicated
      isDefault: false
      quorum: last-man-standing
    volumeSnapshotClass:
      create: true
      name: homefs-snap
