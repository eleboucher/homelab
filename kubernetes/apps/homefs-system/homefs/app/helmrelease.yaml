# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homefs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: homefs
  values:
    image:
      tag: main@sha256:1a8e4c6850a0b6ee8e3b7122e1d991a88bdea8056029a5b983ad868b5cd683e7
    nodes:
      kharkiv:
        backend: lvmthin
        device: /dev/disk/by-partlabel/r-homefs
      paris:
        backend: zfs
        zfsDataset: data-pool/homefs
    storageClass:
      create: true
      name: homefs-local
      isDefault: false
    replicatedStorageClass:
      create: true
      name: homefs-replicated
      isDefault: false
      quorum: last-man-standing
    volumeSnapshotClass:
      create: true
      name: homefs-snap
