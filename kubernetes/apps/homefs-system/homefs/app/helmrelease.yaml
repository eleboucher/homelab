# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homefs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: homefs
  values:
    image:
      # Pin the mutable :main tag by digest — IfNotPresent never re-pulls a
      # cached tag, so pods silently run stale builds otherwise.
      tag: main@sha256:be72aed0e34403a86c7b73b58e1166e0511f065a658d572ae9307dca688652f7
    nodes:
      kharkiv:
        backend: lvmthin
        device: /dev/disk/by-partlabel/r-homefs
      paris:
        backend: zfs
        zfsDataset: data-pool/homefs
    storageClass:
      create: true
      name: homefs-local
      isDefault: false
    replicatedStorageClass:
      create: true
      name: homefs-replicated
      isDefault: false
      quorum: last-man-standing
    volumeSnapshotClass:
      create: true
      name: homefs-snap
