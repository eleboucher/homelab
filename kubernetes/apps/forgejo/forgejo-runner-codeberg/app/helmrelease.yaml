# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner-codeberg
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo-runner-codeberg
  interval: 30m
  values:
    serviceAccount:
      forgejo-runner-codeberg: {}
    defaultPodOptions:
      automountServiceAccountToken: true
    configMaps:
      config:
        suffix: config
        data:
          runner.yaml: |-
            cache:
              enabled: true
              dir: /data/cache
            container:
              docker_host: "-"
              workdir_parent: shared/workdir
            host:
              workdir_parent: /data/act
            kubernetes:
              namespace: forgejo
              poll_timeout: 10m
            log:
              level: info
            plugins:
              k8s:
                address: "unix:///plugin/forgejo-runner-k8s.sock"
                options:
                  namespace: forgejo
                  poll_timeout: 10m
                  labels: "app.kubernetes.io/name=forgejo-runner-instance,egress.home.arpa/custom-egress=true"
                  resources: |
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      memory: 1Gi
            runner:
              capacity: 3
              labels:
                - ubuntu-latest:k8s:/config/podspec-default.yaml
                - default:k8s:/config/podspec-default.yaml
                - docker:k8s:/config/podspec-dind.yaml
                - multiarch:k8s:/config/podspec-dind.yaml  # you need binfmt-misc extension for multiarch
              timeout: 3h
              shutdown_timeout: 3m
          podspec-default.yaml: |-
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:c63459cc38364ab58f852bbcbc41685e42510d67e3ee081c3e7abd73486f98f8
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  requests:
                    cpu: 100m
                    memory: 1Gi
                  limits:
                    cpu: 500m
                    memory: 4Gi
            nodeSelector:
              kubernetes.io/hostname: paris
            restartPolicy: Never
          podspec-dind.yaml: |-
            initContainers:
              - name: dind
                image: docker:29-dind
                securityContext:
                  privileged: true
                restartPolicy: Always
                env:
                  - name: DOCKER_TLS_CERTDIR
                    value: /certs
                resources:
                  requests:
                    cpu: 100m
                    memory: 1Gi
                  limits:
                    cpu: 500m
                    memory: 8Gi
                volumeMounts:
                  - name: docker-storage
                    mountPath: /var/lib/docker
                  - name: docker-certs
                    mountPath: /certs
                startupProbe:
                  exec:
                    command:
                      - sh
                      - -c
                      - docker --tlsverify --tlscacert=/certs/client/ca.pem --tlscert=/certs/client/cert.pem --tlskey=/certs/client/key.pem -H tcp://localhost:2376 info
                  initialDelaySeconds: 5
                  periodSeconds: 1
                  failureThreshold: 30
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                  - name: DOCKER_HOST
                    value: tcp://localhost:2376
                  - name: DOCKER_TLS_VERIFY
                    value: "1"
                  - name: DOCKER_CERT_PATH
                    value: /certs/client
                image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:c63459cc38364ab58f852bbcbc41685e42510d67e3ee081c3e7abd73486f98f8
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  requests:
                    cpu: 100m
                    memory: 1Gi
                  limits:
                    cpu: 500m
                    memory: 4Gi
                volumeMounts:
                  - name: docker-certs
                    mountPath: /certs
                    readOnly: true
            volumes:
              - name: docker-storage
                emptyDir: {}
              - name: docker-certs
                emptyDir: {}
            nodeSelector:
              kubernetes.io/hostname: paris
            restartPolicy: Never
    controllers:
      forgejo-runner-codeberg:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          # must cover runner.shutdown_timeout plus the plugin's 60s cleanup budget
          terminationGracePeriodSeconds: 300
          labels:
            app.kubernetes.io/component: forgejo-runner-codeberg
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        initContainers:
          # native sidecar: started before, and terminated after, the runner
          # container, so the plugin socket outlives job draining on shutdown
          k8s-plugin:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner-k8s-plugin
              tag: 12.10.6
            args:
              - --listen
              - unix:///plugin/forgejo-runner-k8s.sock
            restartPolicy: Always
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: 12.10.2
            command:
              - sh
              - -ec
              - |
                exec /bin/forgejo-runner daemon \
                  --config /config/runner.yaml \
                  --url "https://codeberg.org" \
                  --uuid "$(cat /etc/forgejo-runner-secret/uuid)" \
                  --token-url file:///etc/forgejo-runner-secret/token
            resources:
              requests:
                cpu: 5m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    rbac:
      roles:
        forgejo-runner-codeberg:
          type: Role
          rules:
            - apiGroups:
                - "batch"
              resources:
                - jobs
              verbs:
                - create
                - get
                - list
                - watch
                - delete
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - list
                - watch
                - get
            - apiGroups:
                - ""
              resources:
                - pods/exec
              verbs:
                - create
                - get
            - apiGroups:
                - ""
              resources:
                - pods/log
              verbs:
                - list
                - watch
                - get
      bindings:
        forgejo-runner-codeberg:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner-codeberg
          subjects:
            - identifier: forgejo-runner-codeberg
    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
      runner-secret:
        type: secret
        name: forgejo-runner-codeberg-secret
        globalMounts:
          - path: /etc/forgejo-runner-secret
            readOnly: true
      plugins:
        type: emptyDir
        globalMounts:
          - path: /plugin
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp
