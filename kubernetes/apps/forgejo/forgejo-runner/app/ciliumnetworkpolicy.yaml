---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: forgejo-runner
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: forgejo-runner-instance
  enableDefaultDeny:
    ingress: true
  egress:
    - # Forgejo server
      toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: forgejo
            k8s:io.kubernetes.pod.namespace: forgejo
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    - # Registries
      toFQDNs:
        - matchName: git.erwanleboucher.dev
        - matchName: registry.erwanleboucher.dev
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - # Internet egress
      toCIDRSet:
        - cidrGroupRef: internet
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
