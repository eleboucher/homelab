---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/model_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-reranker-0.6b
spec:
  format: gguf
  hardware:
    accelerator: cpu
  quantization: Q4_K_M
  source: https://huggingface.co/Voodisss/Qwen3-Reranker-0.6B-GGUF-llama_cpp/resolve/main/Qwen3-Reranker-0.6B-Q4_K_M.gguf
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-reranker-0.6b
spec:
  modelRef: qwen3-reranker-0.6b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-b9744@sha256:9e2ab5775c2e9cb52ac611e506ea5b873247033aeba54d71f20d71bf7f4e219d
  replicas: 1
  podSecurityContext:
    # 102 = curlimages/curl curl_group GID; makes the /models emptyDir
    # writable by the model-downloader init container (we override the
    # chart's default fsGroup by supplying podSecurityContext).
    fsGroup: 102
  # per-slot ctx = contextSize/parallelSlots; 2 slots = 4096, fits memini's query+doc.
  contextSize: 8192
  parallelSlots: 2
  batchSize: 8192
  uBatchSize: 4096
  resources:
    cpu: "2"
    memory: 4Gi
  extraArgs:
    # Qwen3-Reranker needs rank pooling; --reranking + --pooling rank exposes
    # the Cohere-style /v1/rerank endpoint memini calls.
    - --reranking
    - --pooling
    - rank
    - --embedding
    - --cache-ram
    - "0"
    - --no-mmap
    - --sleep-idle-seconds
    - "300"
    - --alias
    - qwen3-reranker-0.6b
    - --metrics
    # CPU inference: bound the thread pool so it doesn't oversubscribe the node
    # (llama.cpp otherwise defaults to the host's full core count).
    - --threads
    - "8"
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 60
    liveness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 3
