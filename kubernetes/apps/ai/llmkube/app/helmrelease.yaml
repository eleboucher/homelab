---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  chartRef:
    kind: OCIRepository
    name: llmkube
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    modelCache:
      enabled: true
      # perService gives each InferenceService its own RWO cache that binds on the
      # node its pod schedules to, so the embedder can run on kharkiv's iGPU and the
      # reranker on paris's Arc without one shared node-pinned (or RWX) volume.
      # miroir-local is WaitForFirstConsumer + node-local (per-service
      # cache binds on the node the pod schedules to).
      mode: perService
      size: 20Gi
      storageClass: miroir-local
    prometheus:
      inferencePodMonitor:
        enabled: false
