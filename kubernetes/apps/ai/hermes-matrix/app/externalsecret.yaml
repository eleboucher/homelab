---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-matrix
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-matrix
    creationPolicy: Owner
    template:
      data:
        # Reuse the Matrix creds the main agent already stores in 1Password
        # (the hermes/litellm items — same values the main hermes config blob
        # templates). No new 1Password item needed.
        MATRIX_HOMESERVER: "{{ .MATRIX_HOMESERVER }}"
        MATRIX_USER_ID: "{{ .MATRIX_USER_ID }}"
        MATRIX_ACCESS_TOKEN: "{{ .MATRIX_ACCESS_TOKEN }}"
        MATRIX_ALLOWED_USERS: "{{ .MATRIX_ALLOWED_USERS }}"
        MATRIX_HOME_ROOM: "{{ .MATRIX_HOME_ROOM }}"
        # Proxy auth — same value as the main agent's API_SERVER_KEY.
        GATEWAY_PROXY_KEY: "{{ .API_SERVER_KEY }}"
  dataFrom:
    - extract:
        key: litellm
    - extract:
        key: hermes
