---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name memini
spec:
  chartRef:
    kind: OCIRepository
    name: memini
  interval: 30m
  values:
    fullnameOverride: *name
    image:
      repository: git.erwanleboucher.dev/eleboucher/memini
      tag: latest
      # Clear the digest the released chart pins, so the floating tag wins.
      digest: ""
    backend: postgres
    config:
      logFormat: json
    embeddings:
      baseURL: http://text-embeddings-inference.ai.svc.cluster.local:8080/v1
      model: all-MiniLM-L6-v2
      dims: 384
    postgres:
      dsnSecret:
        name: memini-postgres
        key: url
    auth:
      apiKeySecret:
        name: *name
        key: MEMINI_API_KEY
    ui:
      enabled: true
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - memini.erwanleboucher.dev
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
