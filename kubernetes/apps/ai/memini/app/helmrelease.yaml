# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name memini
spec:
  chartRef:
    kind: OCIRepository
    name: memini
  interval: 30m
  upgrade:
    force: true
  values:
    global:
      fullnameOverride: *name
    controllers:
      main:
        type: deployment
        replicas: 1
        pod:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
        containers:
          main:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
            env:
              MEMINI_BACKEND: postgres
              MEMINI_LOG_FORMAT: json
              MEMINI_DEMOTE_AFTER: 1440h
              MEMINI_TOMBSTONE_TTL: 720h
              MEMINI_EMBED_BASE_URL: http://qwen3-embedding-0-6b.ai.svc.cluster.local:8080/v1
              MEMINI_EMBED_MODEL: qwen3-embedding-0.6b
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_EMBED_QUERY_PREFIX: "Instruct: Given a user message, retrieve relevant past memories\nQuery: "
              MEMINI_RECALL_MIN_SEMANTIC_SCORE: "0.46"
              MEMINI_RERANK: http://qwen3-reranker-0-6b.ai.svc.cluster.local:8080/v1
              MEMINI_RERANK_MODEL: qwen3-reranker-0.6b
              MEMINI_RERANK_MAX_DOC_CHARS: "4000"
              MEMINI_POSTGRES_DSN:
                valueFrom:
                  secretKeyRef:
                    name: memini-postgres
                    key: url
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: *name
                    key: MEMINI_API_KEY
    persistence:
      data:
        enabled: false
    serviceMonitor:
      main:
        enabled: true
    route:
      main:
        enabled: true
        annotations:
          gatus.home-operations.com/endpoint: |-
            path: /healthz
        parentRefs:
          - name: envoy-external
            namespace: network
        hostnames:
          - memini.erwanleboucher.dev
      # Split-horizon: same host, internal gateway serves the UI (catch-all) on-LAN.
      ui:
        enabled: true
        annotations:
          gatus.home-operations.com/enabled: "false"
        parentRefs:
          - name: envoy-internal
            namespace: network
        hostnames:
          - memini.erwanleboucher.dev
