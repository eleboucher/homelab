# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name memini
spec:
  chartRef:
    kind: OCIRepository
    name: memini
  interval: 30m
  values:
    fullnameOverride: *name
    backend: postgres
    config:
      logFormat: json
      writeDedupMinScore: 0.95
      demoteAfter: 1440h
      tombstoneTTL: 720h
    embeddings:
      baseURL: http://text-embeddings-inference.ai.svc.cluster.local:8080/v1
      model: all-MiniLM-L6-v2
      dims: 384
    # Cross-encoder recall reranking (no LLM). Qwen3-Reranker-0.6B served by
    # llama-server --reranking exposes the Cohere-style /v1/rerank memini calls.
    rerank:
      mode: http://llama-cpp-reranker.ai.svc.cluster.local:8080/v1
      model: qwen3-reranker-0.6b
      topN: 20
      # keep query+doc within the reranker's 2048-token ubatch, else rerank 500s.
      maxDocChars: 4000
    postgres:
      dsnSecret:
        name: memini-postgres
        key: url
    auth:
      apiKeySecret:
        name: *name
        key: MEMINI_API_KEY
    ui:
      enabled: true
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - memini.erwanleboucher.dev
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
