---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm
spec:
  parentRefs:
    - name: agentgateway-proxy
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - gateway.erwanleboucher.dev
    - litellm.erwanleboucher.dev
  rules:
    - backendRefs:
        - name: llm
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-internal-edge
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  hostnames:
    - gateway.erwanleboucher.dev
    - litellm.erwanleboucher.dev
  rules:
    - backendRefs:
        - name: agentgateway
          port: 80
