---
# External-facing route. Hostnames here drive the external-dns record
# (resolves to the agentgateway-proxy LoadBalancer IP, e.g. 192.168.69.122).
# Body-based routing: agentgatewaypolicy.yaml copies the request body's `model`
# field into the `x-model` header; rules below match it with a regex.
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm
spec:
  parentRefs:
    - name: agentgateway-proxy
      kind: Gateway
      group: gateway.networking.k8s.io
  hostnames:
    - gateway.erwanleboucher.dev
    - litellm.erwanleboucher.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /anthropic
      backendRefs:
        - name: llm-minimax-anthropic
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - headers:
            - type: RegularExpression
              name: x-model
              value: "^minimax/.*"
      backendRefs:
        - name: llm-minimax
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - headers:
            - type: RegularExpression
              name: x-model
              value: "^qwen.*"
      backendRefs:
        - name: llm-qwen
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - headers:
            - type: RegularExpression
              name: x-model
              value: "^gemma.*"
      backendRefs:
        - name: llm-gemma
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
# In-cluster catch-all so callers using the Service DNS (hermes hitting
# agentgateway-proxy.ai.svc.cluster.local) still reach a backend.
# No hostnames here = no external-dns record, no conflict with the route above.
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-internal
spec:
  parentRefs:
    - name: agentgateway-proxy
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /anthropic
      backendRefs:
        - name: llm-minimax-anthropic
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - headers:
            - type: RegularExpression
              name: x-model
              value: "^minimax/.*"
      backendRefs:
        - name: llm-minimax
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - headers:
            - type: RegularExpression
              name: x-model
              value: "^qwen.*"
      backendRefs:
        - name: llm-qwen
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - headers:
            - type: RegularExpression
              name: x-model
              value: "^gemma.*"
      backendRefs:
        - name: llm-gemma
          group: agentgateway.dev
          kind: AgentgatewayBackend
