---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: llama-auth
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: llama-auth
    creationPolicy: Owner
    template:
      data:
        Authorization: "Bearer {{ .LLAMA_API_KEY }}"
  dataFrom:
    - extract:
        key: litellm
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minimax-auth
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: minimax-auth
    creationPolicy: Owner
    template:
      data:
        Authorization: "Bearer {{ .MINIMAX_API_KEY }}"
  dataFrom:
    - extract:
        key: litellm
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minimax-anthropic-auth
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: minimax-anthropic-auth
    creationPolicy: Owner
    template:
      data:
        x-api-key: "{{ .MINIMAX_API_KEY }}"
        anthropic-version: "2023-06-01"
  dataFrom:
    - extract:
        key: litellm
