---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-cpp
spec:
  chartRef:
    kind: OCIRepository
    name: llama-cpp
  interval: 1h
  values:
    controllers:
      llama-cpp:
        pod:
          nodeSelector:
            kubernetes.io/hostname: paris
          securityContext:
            supplementalGroups:
              - 44
              - 992
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        type: deployment
        initContainers:
          download-gemma:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.14-alpine
            command:
              - /bin/sh
              - -ec
              - |
                uv pip install --system --no-cache huggingface_hub
                download-model unsloth/gemma-4-E4B-it-GGUF:UD-Q8_K_XL
            env:
              HUGGINGFACE_HUB_CACHE: /models
              HF_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: HF_TOKEN
        containers:
          gemma:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-vulkan-b9765@sha256:fe3943691dc11afeea4c273db08ad44fb4ed4d12d19a7c23af47f0f9623d76ff
            args:
              - --metrics
              - --model
              - /models/models--unsloth--gemma-4-E4B-it-GGUF/model.gguf
              - --mmproj
              - /models/models--unsloth--gemma-4-E4B-it-GGUF/mmproj.gguf
              - --ctx-size
              - "32768"
              - --no-mmap
              - --flash-attn
              - on
              - --sleep-idle-seconds
              - "60"
              - --temp
              - "1.0"
              - --top-k
              - "64"
              - --top-p
              - "0.95"
              - --alias
              - gemma
            env:
              LLAMA_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: LLAMA_API_KEY
              LLAMA_ARG_HOST: 0.0.0.0
              LLAMA_ARG_PORT: "8082"
              LLAMA_OFFLINE: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8082
                  failureThreshold: 3
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8082
                  failureThreshold: 3
                  periodSeconds: 10
                  timeoutSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8082
                  failureThreshold: 60
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 4Gi
              limits:
                memory: 12Gi
            securityContext:
              privileged: true
    service:
      gemma:
        controller: llama-cpp
        ports:
          http:
            port: 8080
            targetPort: 8082
            protocol: TCP
    persistence:
      download-script:
        type: configMap
        name: llama-cpp-download-script
        defaultMode: 0o755
        advancedMounts:
          llama-cpp:
            download-gemma:
              - path: /usr/bin/download-model
                subPath: download-model.sh
                readOnly: true
      models:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: openebs-hostpath
        advancedMounts:
          llama-cpp:
            gemma:
              - path: /models
                readOnly: true
            download-gemma:
              - path: /models
                readOnly: false
      render-device:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
