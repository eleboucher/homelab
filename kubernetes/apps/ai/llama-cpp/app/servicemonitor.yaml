---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llama-cpp
  labels:
    app.kubernetes.io/name: llama-cpp
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-cpp
  namespaceSelector:
    matchNames:
      - ai
  targetLabels:
    - app.kubernetes.io/instance
    - app.kubernetes.io/name
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      authorization:
        type: Bearer
        credentials:
          name: llama-cpp-secret
          key: LLAMA_API_KEY
