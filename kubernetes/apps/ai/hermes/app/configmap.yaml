---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-configmap
data:
  config.yaml: |-
    custom_providers:
      - name: litellm
        base_url: http://litellm.ai:4000/v1
        key_env: LITELLM_API_KEY
    model:
      default: minimax/MiniMax-M2.7
      provider: custom:litellm
    model_aliases:
      gemma:
        model: gemma
        provider: custom:litellm
      qwen:
        model: qwen
        provider: custom:litellm
      minimax:
        model: minimax/MiniMax-M2.7
        provider: custom:litellm
    fallback_providers:
      - provider: custom:litellm
        model: qwen
      - provider: custom:litellm
        model: gemma
    terminal:
      backend: docker
      docker_image: nikolaik/python-nodejs:python3.11-nodejs20
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
    memory:
      auto_migrate: true
      auto_summarize:
        threshold: 50
    compression:
      enabled: true
    streaming:
      enabled: false
    security:
      redact_secrets: true
    privacy:
      redact_pii: true
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      api_max_retries: 2
      reasoning_effort: medium
    platforms:
      matrix:
        enabled: true
    matrix:
      require_mention: false
      auto_thread: false
      dm_mention_threads: false
    display:
      platforms:
        matrix:
          tool_progress: "off"
    mcp_servers:
      homelab:
        url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
    web:
      search_backend: searxng
  env: |-
    LITELLM_API_KEY={{ .LITELLM_MASTER_KEY }}
    MATRIX_HOMESERVER={{ .MATRIX_HOMESERVER }}
    MATRIX_ACCESS_TOKEN={{ .MATRIX_ACCESS_TOKEN }}
    MATRIX_USER_ID={{ .MATRIX_USER_ID }}
    MATRIX_ALLOWED_USERS={{ .MATRIX_ALLOWED_USERS }}
    API_SERVER_KEY={{ .API_SERVER_KEY }}
    GATEWAY_ALLOWED_USERS={{ .GATEWAY_ALLOWED_USERS }}
