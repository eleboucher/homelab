apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-configmap
data:
  config.yaml: |-
    custom_providers:
      - name: litellm
        base_url: http://litellm.ai:4000/v1
        key_env: LITELLM_API_KEY
        models:
          minimax/MiniMax-M3:
            context_length: 1000000
          glm-5.2:
            context_length: 1000000
          glm-5-turbo:
            context_length: 200000
          neuralwatt/glm-5.2:
            context_length: 1048560
          neuralwatt/qwen3.6-35b:
            context_length: 131056
          gemma:
            context_length: 32768
          qwen:
            context_length: 262144
    model:
      default: minimax/MiniMax-M3
      provider: custom:litellm
      context_length: 1000000
    model_aliases:
      gemma:
        model: gemma
        provider: custom:litellm
      qwen:
        model: qwen
        provider: custom:litellm
      minimax:
        model: minimax/MiniMax-M3
        provider: custom:litellm
      glm:
        model: glm-5.2
        provider: custom:litellm
      glm-turbo:
        model: glm-5-turbo
        provider: custom:litellm
      neuralwatt-glm:
        model: neuralwatt/glm-5.2
        provider: custom:litellm
      neuralwatt-qwen:
        model: neuralwatt/qwen3.6-35b
        provider: custom:litellm
    fallback_providers:
      - provider: custom:litellm
        model: qwen
      - provider: custom:litellm
        model: gemma
    auxiliary:
      approval:
        provider: custom:litellm
        model: minimax/MiniMax-M3
        timeout: 60
      compression:
        provider: custom:litellm
        model: minimax/MiniMax-M3
      web_extract:
        provider: custom:litellm
        model: minimax/MiniMax-M3
      session_search:
        provider: custom:litellm
        model: glm-5-turbo
      vision:
        provider: custom:litellm
        model: minimax/MiniMax-M3
      goal_judge:
        provider: custom:litellm
        model: glm-5-turbo
      title_generation:
        provider: custom:litellm
        model: glm-5-turbo
      profile_describer:
        provider: custom:litellm
        model: glm-5-turbo
      triage_specifier:
        provider: custom:litellm
        model: glm-5-turbo
      kanban_decomposer:
        provider: custom:litellm
        model: glm-5-turbo
      curator:
        provider: custom:litellm
        model: glm-5-turbo
        timeout: 600
    memory:
      provider: memini
    plugins:
      enabled:
        - memini
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 900
      lifetime_seconds: 1800
      persistent_shell: true
    compression:
      enabled: true
      protect_last_n: 20
      threshold: 0.5
    streaming:
      enabled: false
    approvals:
      mode: smart
      timeout: 60
      cron_mode: deny
    security:
      redact_secrets: true
      website_blocklist:
        enabled: true
        domains:
          - "169.254.169.254"
          - "metadata.google.internal"
    privacy:
      redact_pii: true
    agent:
      max_turns: 150
      gateway_timeout: 1800
      gateway_timeout_warning: 900
      restart_drain_timeout: 60
      api_max_retries: 3
      reasoning_effort: medium
    delegation:
      model: glm-5-turbo
      max_concurrent_children: 8
      max_spawn_depth: 2
    moa:
      default_preset: council
      presets:
        council:
          enabled: true
          reference_models:
            - provider: custom:litellm
              model: minimax/MiniMax-M3
            - provider: custom:litellm
              model: glm-5.2
            - provider: custom:litellm
              model: neuralwatt/qwen3.6-35b
          aggregator:
            provider: custom:litellm
            model: minimax/MiniMax-M3
          reference_temperature: 0.6
          aggregator_temperature: 0.4
          max_tokens: 8192
    platforms:
      matrix:
        enabled: false
    matrix:
      require_mention: false
      auto_thread: false
      dm_mention_threads: false
    display:
      platforms:
        matrix:
          tool_progress: "off"
    mcp_servers:
      homelab:
        url: http://litellm.ai:4000/mcp
        headers:
          Authorization: "Bearer ${LITELLM_API_KEY}"
    web:
      search_backend: searxng
  env: |-
    LITELLM_API_KEY={{ .LITELLM_MASTER_KEY }}
    OPENAI_API_KEY={{ .LITELLM_MASTER_KEY }}
    OPENAI_BASE_URL=http://litellm.ai:4000/v1
    SUMMARY_LLM_API_KEY={{ .LITELLM_MASTER_KEY }}
    API_SERVER_KEY={{ .API_SERVER_KEY }}
    GATEWAY_ALLOWED_USERS={{ .GATEWAY_ALLOWED_USERS }}
