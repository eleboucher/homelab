---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-configmap
data:
  config.yaml: |-
    model:
      default: minimax
      provider: custom
      base_url: http://litellm.ai:4000/v1
      api_key: ${LITELLM_API_KEY}
    model_aliases:
      gemma:
        model: gemma
        provider: custom
        base_url: http://litellm.ai:4000/v1
      qwen:
        model: qwen
        provider: custom
        base_url: http://litellm.ai:4000/v1
      minimax:
        model: minimax/MiniMax-M2.7
        provider: custom
        base_url: http://litellm.ai:4000/v1
    fallback_providers:
      - provider: custom
        model: qwen
      - provider: custom
        model: gemma
    terminal:
      backend: docker
      docker_image: python:3.11-slim
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
    memory:
      auto_migrate: true
      auto_summarize:
        threshold: 50
    compression:
      enabled: true
    streaming:
      enabled: false
    security:
      redact_secrets: true
    privacy:
      redact_pii: true
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      api_max_retries: 2
      reasoning_effort: medium
    platforms:
      matrix:
        enabled: true
        homeserver: http://continuwuity.matrix.svc.cluster.local:8080
        encryption: true
        device_id: HERMES_BOT
    mcp_servers:
      homelab:
        url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
      searxng:
        url: http://searxng.selfhosted.svc.cluster.local:8080
  env: |-
    LITELLM_API_KEY={{ .LITELLM_MASTER_KEY }}
    MATRIX_HOMESERVER={{ .MATRIX_HOMESERVER }}
    MATRIX_ACCESS_TOKEN={{ .MATRIX_ACCESS_TOKEN }}
    MATRIX_USER_ID={{ .MATRIX_USER_ID }}
    MATRIX_ALLOWED_USERS={{ .MATRIX_ALLOWED_USERS }}
    API_SERVER_KEY={{ .API_SERVER_KEY }}
    GATEWAY_ALLOWED_USERS={{ .GATEWAY_ALLOWED_USERS }}
