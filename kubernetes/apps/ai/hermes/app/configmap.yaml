---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-configmap
data:
  config.yaml: |-
    custom_providers:
      - name: litellm
        base_url: http://agentgateway-proxy.ai.svc.cluster.local/v1
        key_env: LITELLM_API_KEY
        models:
          minimax/MiniMax-M2.7:
            context_length: 204800
    model:
      default: minimax/MiniMax-M2.7
      provider: custom:litellm
      context_length: 204800
    model_aliases:
      gemma:
        model: gemma
        provider: custom:litellm
      qwen:
        model: qwen
        provider: custom:litellm
      minimax:
        model: minimax/MiniMax-M2.7
        provider: custom:litellm
    fallback_providers:
      - provider: custom:litellm
        model: qwen
      - provider: custom:litellm
        model: gemma
    auxiliary:
      compression:
        provider: custom:litellm
        model: minimax/MiniMax-M2.7
      web_extract:
        provider: custom:litellm
        model: minimax/MiniMax-M2.7
      session_search:
        provider: custom:litellm
        model: minimax/MiniMax-M2.7
      vision:
        provider: custom:litellm
        model: minimax/MiniMax-M2.7
      goal_judge:
        provider: custom:litellm
        model: minimax/MiniMax-M2.7
      title_generator:
        provider: custom:litellm
        model: minimax/MiniMax-M2.7
      profile_describer:
        provider: custom:litellm
        model: minimax/MiniMax-M2.7
      triage_specifier:
        provider: custom:litellm
        model: minimax/MiniMax-M2.7
      kanban_decomposer:
        provider: custom:litellm
        model: minimax/MiniMax-M2.7
    plugins:
      enabled:
        - agentmemory
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 900
      lifetime_seconds: 1800
      persistent_shell: true
    memory:
      provider: agentmemory
    compression:
      enabled: true
      protect_first_n: 0
      threshold: 0.8
    streaming:
      enabled: false
    security:
      redact_secrets: true
    privacy:
      redact_pii: true
    agent:
      max_turns: 90
      gateway_timeout: 1800
      gateway_timeout_warning: 900
      restart_drain_timeout: 60
      api_max_retries: 3
      reasoning_effort: medium
    platforms:
      matrix:
        enabled: true
    matrix:
      require_mention: false
      auto_thread: false
      dm_mention_threads: false
    display:
      platforms:
        matrix:
          tool_progress: "off"
    mcp_servers:
      homelab:
        url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
    web:
      search_backend: searxng
  env: |-
    AGENTMEMORY_URL=http://agentmemory.ai.svc.cluster.local:3111
    AGENTMEMORY_SECRET={{ .AGENTMEMORY_SECRET }}
    LITELLM_API_KEY={{ .LITELLM_MASTER_KEY }}
    OPENAI_API_KEY={{ .LITELLM_MASTER_KEY }}
    OPENAI_BASE_URL=http://agentgateway-proxy.ai.svc.cluster.local/v1
    SUMMARY_LLM_API_KEY={{ .LITELLM_MASTER_KEY }}
    MATRIX_HOMESERVER={{ .MATRIX_HOMESERVER }}
    MATRIX_ACCESS_TOKEN={{ .MATRIX_ACCESS_TOKEN }}
    MATRIX_USER_ID={{ .MATRIX_USER_ID }}
    MATRIX_ALLOWED_USERS={{ .MATRIX_ALLOWED_USERS }}
    MATRIX_HOME_ROOM={{ .MATRIX_HOME_ROOM }}
    MATRIX_HOME_ROOM_THREAD_ID={{ .MATRIX_HOME_ROOM_THREAD_ID }}
    API_SERVER_KEY={{ .API_SERVER_KEY }}
    GATEWAY_ALLOWED_USERS={{ .GATEWAY_ALLOWED_USERS }}
