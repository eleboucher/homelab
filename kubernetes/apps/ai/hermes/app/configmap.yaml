---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-configmap
data:
  config.yaml: |-
    custom_providers:
      - name: llamacpp
        base_url: http://llama-cpp.ai:8080/v1
        key_env: LLAMA_API_KEY
      - name: minimax
        base_url: https://api.minimax.io/v1
        key_env: MINIMAX_API_KEY
        models:
          MiniMax-M2.7:
            context_length: 204800
          MiniMax-M2.7-highspeed:
            context_length: 204800
    model:
      default: "MiniMax-M2.7"
      provider: custom:minimax
    model_aliases:
      gemma:
        model: google/gemma-4-E4B-it
        provider: custom:llamacpp
      qwen:
        model: qwen/qwen3.6-27B:general
        provider: custom:llamacpp
    fallback_providers:
      - provider: custom:llamacpp
        model: qwen/qwen3.6-27B:general
      - provider: custom:llamacpp
        model: google/gemma-4-E4B-it
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
      env_passthrough:
        - DISCORD_WEBHOOK
        - HOMELAB_GH_TOKEN
    plugins:
      enabled:
        - agentmemory
    memory:
      provider: agentmemory
      auto_migrate: true
      auto_summarize:
        threshold: 50
    compression:
      enabled: true
      threshold: 0.8
      target_ratio: 0.15
      protect_last_n: 10
    auxiliary:
      compression:
        model: llamacpp/google/gemma-4-E4B-it
        provider: custom:llamacpp
    group_sessions_per_user: false
    streaming:
      enabled: false
    security:
      redact_secrets: true
      tirith_enabled: true
      tirith_fail_open: true
    privacy:
      redact_pii: true
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      api_max_retries: 2
      reasoning_effort: medium
      tool_use_enforcement: auto
    platforms:
      matrix:
        enabled: true
    matrix:
      require_mention: false
      auto_thread: false
      dm_mention_threads: false
    display:
      platforms:
        matrix:
          tool_progress: "off"
    mcp_servers:
      homelab:
        url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
    web:
      search_backend: searxng
  env: |-
    AGENTMEMORY_URL=http://agentmemory.ai.svc.cluster.local:3111
    AGENTMEMORY_SECRET={{ .AGENTMEMORY_SECRET }}
    LLAMA_API_KEY={{ .LLAMA_API_KEY }}
    MINIMAX_API_KEY={{ .MINIMAX_API_KEY }}
    MATRIX_HOMESERVER={{ .MATRIX_HOMESERVER }}
    MATRIX_ACCESS_TOKEN={{ .MATRIX_ACCESS_TOKEN }}
    MATRIX_USER_ID={{ .MATRIX_USER_ID }}
    MATRIX_ALLOWED_USERS={{ .MATRIX_ALLOWED_USERS }}
    MATRIX_HOME_ROOM={{ .MATRIX_HOME_ROOM }}
    MATRIX_HOME_ROOM_THREAD_ID={{ .MATRIX_HOME_ROOM_THREAD_ID }}
    API_SERVER_KEY={{ .API_SERVER_KEY }}
    GATEWAY_ALLOWED_USERS={{ .GATEWAY_ALLOWED_USERS }}
