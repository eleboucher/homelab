apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-configmap
data:
  config.yaml: |-
    custom_providers:
      - name: litellm
        base_url: http://litellm.ai:4000/v1
        key_env: LITELLM_API_KEY
        models:
          minimax/MiniMax-M3:
            context_length: 192000
      - name: litellm-anthropic
        base_url: http://litellm.ai:4000
        key_env: LITELLM_API_KEY
        api_mode: anthropic_messages
        models:
          MiniMax-M3:
            context_length: 1000000
    model:
      default: MiniMax-M3
      provider: custom:litellm-anthropic
      context_length: 1000000
    model_aliases:
      gemma:
        model: gemma
        provider: custom:litellm
      qwen:
        model: qwen
        provider: custom:litellm
      minimax:
        model: minimax/MiniMax-M3
        provider: custom:litellm
    fallback_providers:
      - provider: custom:litellm
        model: qwen
      - provider: custom:litellm
        model: gemma
    auxiliary:
      approval:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
        timeout: 60
      compression:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
      web_extract:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
      session_search:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
      vision:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
      goal_judge:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
      title_generator:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
      profile_describer:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
      triage_specifier:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
      kanban_decomposer:
        provider: custom:litellm-anthropic
        model: MiniMax-M3
    memory:
      provider: memini
    plugins:
      enabled:
        - memini
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 900
      lifetime_seconds: 1800
      persistent_shell: true
    compression:
      enabled: true
      protect_first_n: 0
      threshold: 0.8
    streaming:
      enabled: false
    approvals:
      mode: smart
      timeout: 60
      cron_mode: deny
    security:
      redact_secrets: true
      website_blocklist:
        enabled: true
        domains:
          - "169.254.169.254"
          - "metadata.google.internal"
    privacy:
      redact_pii: true
    agent:
      max_turns: 150
      gateway_timeout: 1800
      gateway_timeout_warning: 900
      restart_drain_timeout: 60
      api_max_retries: 3
      reasoning_effort: medium
    platforms:
      matrix:
        enabled: false
    matrix:
      require_mention: false
      auto_thread: false
      dm_mention_threads: false
    display:
      platforms:
        matrix:
          tool_progress: "off"
    mcp_servers:
      homelab:
        url: http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp
    web:
      search_backend: searxng
  env: |-
    LITELLM_API_KEY={{ .LITELLM_MASTER_KEY }}
    OPENAI_API_KEY={{ .LITELLM_MASTER_KEY }}
    OPENAI_BASE_URL=http://litellm.ai:4000/v1
    SUMMARY_LLM_API_KEY={{ .LITELLM_MASTER_KEY }}
    API_SERVER_KEY={{ .API_SERVER_KEY }}
    GATEWAY_ALLOWED_USERS={{ .GATEWAY_ALLOWED_USERS }}
