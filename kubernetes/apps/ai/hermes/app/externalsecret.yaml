---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-config
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-config
    creationPolicy: Owner
    template:
      data:
        GH_TOKEN: "{{ .GH_TOKEN }}"
        DISCORD_WEBHOOK: "{{ .DISCORD_WEBHOOK }}"
      templateFrom:
        - configMap:
            name: hermes-configmap
            items:
              - key: env
  data:
    - secretKey: AGENTMEMORY_SECRET
      remoteRef:
        key: agentmemory
        property: AGENTMEMORY_SECRET
  dataFrom:
    - extract:
        key: hermes
