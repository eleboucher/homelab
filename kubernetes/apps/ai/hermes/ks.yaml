---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermes
  namespace: flux-system
spec:
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: llama-cpp
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 15m
  path: ./kubernetes/apps/ai/hermes/app
  postBuild:
    substitute:
      APP: hermes
      APP_NAMESPACE: ai
      VOLSYNC_CAPACITY: 20Gi
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
  wait: false
