---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermes
  namespace: flux-system
spec:
  components:
    - ../../../../components/kopiur/hot
    - ../../../../components/oidc
  dependsOn:
    - name: kanidm
      namespace: security
    - name: kopiur-repository
      namespace: kopiur-system
    - name: litellm
    - name: miroir
      namespace: miroir-system
  interval: 15m
  path: ./kubernetes/apps/ai/hermes/app
  postBuild:
    substitute:
      APP: hermes
      APP_NAMESPACE: ai
      KOPIUR_CAPACITY: 20Gi
      OIDC_CALLBACK: /auth/callback
      OIDC_DISPLAY_NAME: Hermes
      SUBDOMAIN: hermes
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
  wait: false
