---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mnemory
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: mnemory
  components:
    - ../../../../components/volsync/hot
  dependsOn:
    - name: openebs
      namespace: openebs-system
    - name: litellm
      namespace: ai
    - name: text-embeddings-inference
      namespace: ai
  interval: 1h
  path: "./kubernetes/apps/ai/mnemory/app"
  postBuild:
    substitute:
      APP: mnemory
      APP_NAMESPACE: ai
      VOLSYNC_CAPACITY: 5Gi
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
  wait: false
