# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mnemory
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mnemory-secret
    creationPolicy: Owner
  data:
    # JSON map of API key -> user_id, e.g. {"mnm-erwan-xxxx": "erwan"}.
    # Each connecting client (Claude Code, etc.) sends its key as a Bearer token.
    - secretKey: MCP_API_KEYS
      remoteRef:
        key: mnemory
        property: MCP_API_KEYS
    - secretKey: LLM_API_KEY
      remoteRef:
        key: litellm
        property: LITELLM_MASTER_KEY
