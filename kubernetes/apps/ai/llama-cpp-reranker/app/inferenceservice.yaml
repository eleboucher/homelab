---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-cpp-reranker
spec:
  modelRef: qwen3-reranker-0.6b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9737@sha256:2c7bf6f374d0674bbc4f6e2a2a4d2c33909952d8219743966ba98ecd3f6d5d33
  replicas: 1
  nodeSelector:
    kubernetes.io/hostname: paris
  podSecurityContext:
    # 102 = curlimages/curl curl_group GID; makes the /models emptyDir
    # writable by the model-downloader init container (we override the
    # chart's default fsGroup by supplying podSecurityContext).
    fsGroup: 102
    supplementalGroups:
      - 44
      - 992
  contextSize: 8192
  parallelSlots: 8
  batchSize: 8192
  # 2048 (not 8192) keeps the compute-buffer RAM burst under the memory limit;
  # query+doc must fit this budget or rerank 500s (see memini maxDocChars).
  uBatchSize: 2048
  resources:
    gpu: 1
    cpu: 100m
    memory: 6Gi
  extraArgs:
    # Qwen3-Reranker needs rank pooling; --reranking + --pooling rank exposes
    # the Cohere-style /v1/rerank endpoint memini calls.
    - --reranking
    - --pooling
    - rank
    - --embedding
    - --cache-ram
    - "0"
    - --no-mmap
    - --sleep-idle-seconds
    - "300"
    - --alias
    - qwen3-reranker-0.6b
    - --metrics
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 60
    liveness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 3
