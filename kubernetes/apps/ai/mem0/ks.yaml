---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mem0
  namespace: flux-system
spec:
  components:
    - ../../../../components/postgres/pass
  dependsOn:
    - name: cnpg-cluster
      namespace: database
  interval: 1h
  path: ./kubernetes/apps/ai/mem0/app
  postBuild:
    substitute:
      APP: mem0
      APP_NAMESPACE: ai
      DATABASE_EXTENSIONS: |
        [
          { name: vector },
          { name: vchord }
        ]
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
  wait: false
