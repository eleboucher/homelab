---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arr-mcp
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: arr-mcp
    creationPolicy: Owner
  data:
    - secretKey: sonarr-api-key
      remoteRef:
        key: arr-mcp
        property: SONARR_API_KEY
    - secretKey: radarr-api-key
      remoteRef:
        key: arr-mcp
        property: RADARR_API_KEY
    - secretKey: prowlarr-api-key
      remoteRef:
        key: arr-mcp
        property: PROWLARR_API_KEY
