---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpremoteproxy_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPRemoteProxy
metadata:
  name: sparkyfitness-mcp
spec:
  groupRef:
    name: mcp-tools
  remoteUrl: https://sparkyfitness-mcp.erwanleboucher.dev/mcp
  transport: streamable-http
  headerForward:
    addHeadersFromSecret:
      - headerName: Authorization
        valueSecretRef:
          name: sparkyfitness-mcp
          key: authorization
