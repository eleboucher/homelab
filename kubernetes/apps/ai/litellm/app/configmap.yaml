---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-configmap
data:
  config.yaml: |-
    model_list:
      - model_name: gemma
        litellm_params:
          model: openai/gemma
          api_base: http://llama-cpp-gemma.ai:8080/v1
          api_key: os.environ/LLAMA_API_KEY

      - model_name: qwen
        litellm_params:
          model: openai/qwen
          api_base: http://llama-cpp-qwen.ai:8080/v1
          api_key: os.environ/LLAMA_API_KEY

      - model_name: minimax/MiniMax-M2.7
        litellm_params:
          model: minimax/MiniMax-M2.7
          api_base: https://api.minimax.io/v1
          api_key: os.environ/MINIMAX_API_KEY

    general_settings:
      health_check_endpoint: /v1/health

    router_settings:
      routing_strategy: simple-shuffle
      redis_host: os.environ/REDIS_HOST
      redis_port: os.environ/REDIS_PORT

    litellm_settings:
      success_callback: ["prometheus"]
      prometheus_adapter: true
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
      drop_params: true
      set_verbose: false

    environment:
      - LLAMA_API_KEY
      - MINIMAX_API_KEY
      - REDIS_HOST
      - REDIS_PORT
