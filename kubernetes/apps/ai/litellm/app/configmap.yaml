apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-configmap
data:
  config.yaml: |-
    model_list:
      - model_name: gemma
        litellm_params:
          model: openai/gemma
          api_base: http://llama-cpp.ai:8080/v1
          api_key: os.environ/LLAMA_API_KEY
        model_info:
          max_tokens: 32768
          max_input_tokens: 32768
          max_output_tokens: 8192

      - model_name: qwen
        litellm_params:
          model: openai/qwen3.6-27b
          api_base: os.environ/SUPER_SERVER_URL
          api_key: os.environ/SUPER_SERVER_PASS
          drop_params: true
        model_info:
          max_tokens: 262144
          max_input_tokens: 262144
          max_output_tokens: 32768
          supports_function_calling: true
          supports_prompt_caching: true

      - model_name: minimax/MiniMax-M3
        litellm_params:
          model: minimax/MiniMax-M3
          api_base: https://api.minimax.io/v1
          api_key: os.environ/MINIMAX_API_KEY
        model_info:
          max_tokens: 1000000
          max_input_tokens: 192000
          max_output_tokens: 16384

      - model_name: minimax/MiniMax-M2.7
        litellm_params:
          model: minimax/MiniMax-M2.7
          api_base: https://api.minimax.io/v1
          api_key: os.environ/MINIMAX_API_KEY
        model_info:
          max_tokens: 204800
          max_input_tokens: 192000
          max_output_tokens: 16384

      - model_name: MiniMax-M3
        litellm_params:
          model: minimax/MiniMax-M3
          api_base: https://api.minimax.io/anthropic/v1/messages
          api_key: os.environ/MINIMAX_API_KEY
          drop_params: true
        model_info:
          mode: messages
          max_input_tokens: 1000000
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true

      - model_name: glm-5.2
        litellm_params:
          model: openai/glm-5.2
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/ZAI_API_KEY
          drop_params: true
        model_info:
          max_input_tokens: 1000000
          max_output_tokens: 131072
          supports_function_calling: true
          supports_prompt_caching: true

      - model_name: glm-5-turbo
        litellm_params:
          model: openai/glm-5-turbo
          api_base: https://api.z.ai/api/coding/paas/v4
          api_key: os.environ/ZAI_API_KEY
          drop_params: true
        model_info:
          max_input_tokens: 200000
          max_output_tokens: 16384
          supports_function_calling: true

      - model_name: neuralwatt/glm-5.2
        litellm_params:
          model: openai/glm-5.2
          api_base: https://api.neuralwatt.com/v1
          api_key: os.environ/NEURALWATT_API_KEY
        model_info:
          max_input_tokens: 1048560
          max_output_tokens: 131072
          supports_function_calling: true

      - model_name: neuralwatt/qwen3.6-35b
        litellm_params:
          model: openai/qwen3.6-35b
          api_base: https://api.neuralwatt.com/v1
          api_key: os.environ/NEURALWATT_API_KEY
        model_info:
          max_input_tokens: 131056
          max_output_tokens: 32768
          supports_function_calling: true
          supports_vision: true

    general_settings:
      health_check_endpoint: /v1/health

    router_settings:
      routing_strategy: simple-shuffle
      redis_host: os.environ/REDIS_HOST
      redis_port: os.environ/REDIS_PORT

    litellm_settings:
      success_callback: ["prometheus"]
      prometheus_adapter: true
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: os.environ/REDIS_PORT
      drop_params: true
      set_verbose: false

    environment:
      - LLAMA_API_KEY
      - MINIMAX_API_KEY
      - NEURALWATT_API_KEY
      - REDIS_HOST
      - REDIS_PORT
      - SUPER_SERVER_URL
      - SUPER_SERVER_PASS
      - ZAI_API_KEY
