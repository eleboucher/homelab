---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: context7-api-key
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: context7-api-key
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: context7
        property: api-key
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-mcp
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: github-mcp
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: github-mcp
        property: GITHUB_PERSONAL_ACCESS_TOKEN
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name homeassistant-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: *name
    template:
      data:
        HOMEASSISTANT_TOKEN: "{{ .HOMEASSISTANT_TOKEN }}"
  dataFrom:
    - extract:
        key: home-assistant
