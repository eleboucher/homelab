---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmproxy_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMProxy
metadata:
  name: litellm
spec:
  # renovate: datasource=docker depName=ghcr.io/berriai/litellm
  image: ghcr.io/berriai/litellm:v1.94.0-rc.2@sha256:467a55498422295f9d3534ad6154dc8075733a10cb41edc85e9ed60be41d3f2c
  replicas: 1
  generalSettings:
    health_check_endpoint: /v1/health
  routerSettings:
    routing_strategy: simple-shuffle
    redis_host: os.environ/REDIS_HOST
    redis_port: os.environ/REDIS_PORT
    num_retries: 3
    timeout: 600
    fallbacks:
      # direct same-model failover
      - opencode-go/glm-5.2: ["zai-org/glm-5.2"]
      - opencode-go/kimi-k2.6: ["moonshotai/kimi-k2.6"]
      - opencode-go/minimax-m3: ["minimaxai/minimax-m3"]
      # cross-family failover (lanes Lilac has no direct twin for)
      - opencode-go/kimi-k2.7-code: ["moonshotai/kimi-k2.6"]
      - opencode-go/mimo-v2.5: ["moonshotai/kimi-k2.6"]
      - opencode-go/qwen3.7-max: ["zai-org/glm-5.2"]
      - opencode-go/qwen3.6-plus: ["zai-org/glm-5.2"]
      - opencode-go/deepseek-v4-flash: ["moonshotai/kimi-k2.6"]
  litellmSettings:
    success_callback: ["prometheus"]
    prometheus_adapter: true
    cache: true
    cache_params:
      type: redis
      host: os.environ/REDIS_HOST
      port: os.environ/REDIS_PORT
    drop_params: true
    merge_reasoning_content_in_choices: true
    set_verbose: false
  env:
    - name: LITELLM_LOG
      value: INFO
    - name: REDIS_HOST
      value: dragonfly.database.svc
    - name: REDIS_PORT
      value: "6379"
    - name: LITELLM_MASTER_KEY
      valueFrom:
        secretKeyRef:
          name: litellm
          key: LITELLM_MASTER_KEY
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 4Gi
  service:
    type: ClusterIP
    port: 4000
  route:
    hostnames:
      - litellm.erwanleboucher.dev
    parentRefs:
      - name: envoy-external
        namespace: network
