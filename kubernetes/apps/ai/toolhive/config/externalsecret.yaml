---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vmcp-auth-server
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: vmcp-auth-server-secret
    creationPolicy: Owner
    template:
      data:
        signing-key: "{{ .toolhive_auth_server_signing_key }}"
        hmac-key: "{{ .toolhive_auth_server_hmac_key }}"
  dataFrom:
    - extract:
        key: toolhive
      rewrite:
        - regexp:
            source: "(.*)"
            target: "toolhive_$1"
