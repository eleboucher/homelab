# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: minimax-shim
  namespace: flux-system
spec:
  dependsOn:
    - name: open-webui
  interval: 15m
  path: ./kubernetes/apps/ai/minimax-shim/app
  postBuild:
    substitute:
      APP: minimax-shim
      APP_NAMESPACE: ai
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 5m
  wait: false
