---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qui
  namespace: flux-system
spec:
  components:
    - ../../../../components/oidc
    - ../../../../components/kopiur/hot
    - ../../../../components/zeroscaler
  interval: 1h
  path: ./kubernetes/apps/downloads/qui/app
  dependsOn:
    - name: envoy-gateway
      namespace: network
    - name: kanidm
      namespace: security
    - name: kopiur-repository
      namespace: kopiur-system
    - name: openebs
      namespace: openebs-system
  postBuild:
    substitute:
      APP: qui
      APP_NAMESPACE: downloads
      KOPIUR_CAPACITY: 2Gi
      KOPIUR_SNAPSHOTCLASS: miroir-snap
      KOPIUR_STORAGECLASS: miroir-replicated
      OIDC_CALLBACK: /api/auth/oidc/callback
      OIDC_GROUP: admins
      OIDC_LEGACY_CRYPTO: "true"
      OIDC_SHORT_USERNAME: "true"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: downloads
  timeout: 5m
  wait: false
