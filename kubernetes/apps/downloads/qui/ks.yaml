---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: qui
  namespace: flux-system
spec:
  components:
    - ../../../../components/oidc
    - ../../../../components/volsync/hot
    - ../../../../components/zeroscaler
  interval: 1h
  path: ./kubernetes/apps/downloads/qui/app
  dependsOn:
    - name: envoy-gateway
      namespace: network
    - name: openebs
      namespace: openebs-system
  postBuild:
    substitute:
      APP: qui
      APP_NAMESPACE: downloads
      OIDC_CALLBACK: /api/auth/oidc/callback
      OIDC_GROUP: admins
      OIDC_LEGACY_CRYPTO: "true"
      OIDC_SHORT_USERNAME: "true"
      VOLSYNC_CAPACITY: 2Gi
      VOLSYNC_SCHEDULE: "20 1-23/2 * * *"
      VOLSYNC_STORAGECLASS: homefs-replicated
      VOLSYNC_SNAPSHOTCLASS: homefs-snap
  patches:
    # backups frozen until the DRBD listener use-after-free fix ships
    # (siderolabs/talos#12968): every volsync run snapshots+clones a DRBD
    # volume, which can crash the node
    - patch: |
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationSource
        metadata:
          name: qui
        spec:
          trigger:
            schedule: "20 4 1 1 *"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: downloads
  timeout: 5m
  wait: false
