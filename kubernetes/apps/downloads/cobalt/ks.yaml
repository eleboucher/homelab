---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cobalt
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/downloads/cobalt/app
  dependsOn:
    - name: envoy-gateway
      namespace: network
  postBuild:
    substitute:
      APP: cobalt
      APP_NAMESPACE: downloads
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: downloads
  timeout: 5m
  wait: false
