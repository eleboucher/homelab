---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: home-assistant
  components:
    - ../../../../components/volsync
    - ../../../../components/oidc
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: "./kubernetes/apps/home-assistant/home-assistant/app"
  postBuild:
    substitute:
      APP: home-assistant
      APP_NAMESPACE: home-assistant
      VOLSYNC_CAPACITY: 10Gi
      SUBDOMAIN: home
      OIDC_CALLBACK: /auth/openid/callback
      OIDC_SHORT_USERNAME: "true"

  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home-assistant
  timeout: 5m
  wait: false
