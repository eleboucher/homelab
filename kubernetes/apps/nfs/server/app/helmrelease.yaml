---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-server
  namespace: nfs
spec:
  chartRef:
    kind: OCIRepository
    name: nfs-server
  interval: 1h
  values:
    controllers:
      nfs-server:
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: nfs-lan
          nodeSelector:
            kubernetes.io/hostname: paris
          priorityClassName: system-cluster-critical
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          terminationGracePeriodSeconds: 60
          tolerations:
            - key: node.kubernetes.io/unschedulable
              operator: Exists
              effect: NoSchedule
        containers:
          app:
            image:
              repository: quay.io/aminvakil/alpine-nfs-server
              tag: latest@sha256:9245af667027198a654a5856cf622821234b7f41420cdc2af8bd3946e0e463a3
            env:
              EXPORTS_MOUNTED: "true"
            lifecycle:
              preStop:
                exec:
                  command:
                    - sh
                    - -c
                    - exportfs -ua; killall -TERM rpc.nfsd; sleep 5
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - rpcinfo -T tcp localhost 100003 >/dev/null && exportfs -s | grep -q /mnt/media
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - rpcinfo -T tcp localhost 100003 >/dev/null && exportfs -s | grep -q /mnt/media
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 256Mi
            securityContext:
              capabilities:
                add:
                  - DAC_READ_SEARCH
                  - NET_BIND_SERVICE
                  - SYS_ADMIN
    service:
      app:
        controller: nfs-server
        type: ClusterIP
        clusterIP: 10.43.1.200
        ports:
          nfs:
            port: 2049
            protocol: TCP
          mountd:
            port: 20048
            protocol: TCP
          rpcbind:
            port: 111
            protocol: TCP
    persistence:
      exports:
        type: configMap
        name: nfs-server-config
        globalMounts:
          - path: /etc/exports
            subPath: exports
      lib-modules:
        type: hostPath
        hostPath: /lib/modules
        globalMounts:
          - path: /lib/modules
            readOnly: true
      media:
        type: hostPath
        hostPath: /var/mnt/media
        globalMounts:
          - path: /mnt/media
