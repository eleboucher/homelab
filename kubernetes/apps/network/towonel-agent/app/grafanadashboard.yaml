# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
# The towonel-agent dashboard is now shipped by the towonel-agent Helm chart
# (monitoring.dashboards.grafanaOperator), versioned with the app. Only the
# hub dashboard remains here (the agent chart does not ship it).
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: towonel-hub
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - datasourceName: VictoriaMetrics
      inputName: DS_PROMETHEUS
  url: https://codeberg.org/towonel/towonel/raw/tag/v0.1.20/deploy/grafana/towonel-hub.json
