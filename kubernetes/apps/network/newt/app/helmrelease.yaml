---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: newt
spec:
  chart:
    spec:
      chart: newt
      version: 1.2.0
      sourceRef:
        kind: HelmRepository
        name: fossorial

  interval: 30m
  values:
    global:

      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true

      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - "ALL"

    # Define your Newt instances here
    newtInstances:
      - name: "main-tunnel"
        enabled: true
        replicas: 1

        auth:
          existingSecretName: "newt-secret"
          keys:
            endpointKey: NEWT_SERVER_URL
            idKey: NEWT_ID
            secretKey: NEWT_SECRET

        resources:
          requests:
            cpu: "10m"
          limits:
            memory: "128Mi"
