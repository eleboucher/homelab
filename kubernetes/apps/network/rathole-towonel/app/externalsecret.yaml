---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rathole-towonel-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: rathole-towonel-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        client.toml: |
          [client]
          remote_addr = "rathole.towonel.dev:2333"
          heartbeat_timeout = 40

          [client.services.prom-write]
          token = "{{ .token }}"
          local_addr = "vmsingle-victoria-metrics.observability.svc.cluster.local:8428"

          [client.services.vlogs-write]
          token = "{{ .token }}"
          local_addr = "victoria-logs-client.observability.svc.cluster.local:9428"

  data:
    - secretKey: token
      remoteRef:
        key: rathole-towonel
        property: token
