---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/gateway.kgateway.dev/listenerpolicy_v1alpha1.json
apiVersion: gateway.kgateway.dev/v1alpha1
kind: ListenerPolicy
metadata:
  name: listener-policy
  namespace: network
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: kgateway-internal
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: kgateway-external
  default:
    httpSettings:
      upgradeConfig:
        enabledUpgrades:
          - websocket
