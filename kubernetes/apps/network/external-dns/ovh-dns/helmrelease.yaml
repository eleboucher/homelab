---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ovh-dns
spec:
  chartRef:
    kind: OCIRepository
    name: ovh-dns
  interval: 1h
  values:
    fullnameOverride: *app
    provider:
      name: ovh
    env:
      - name: &nameToken OVH_APPLICATION_KEY
        valueFrom:
          secretKeyRef:
            name: &secret external-dns-ovh-secret
            key: *nameToken
      - name: &name OVH_APPLICATION_SECRET
        valueFrom:
          secretKeyRef:
            name: *secret
            key: *name
      - name: &name OVH_CONSUMER_KEY
        valueFrom:
          secretKeyRef:
            name: *secret
            key: *name
    logLevel: debug
    extraArgs:
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --gateway-name=envoy-external
    triggerLoopOnEvent: true
    policy: sync
    sources:
      - crd
      - gateway-httproute
    txtOwnerId: default
    txtPrefix: "k8s-%{record_type}." # Required for managing root domains. See: https://github.com/kubernetes-sigs/external-dns/blob/82905488a8cc963393f623f9a8ba484a141e81dc/docs/registry/txt.md?plain=1#L8
    domainFilters:
      - erwanleboucher.dev
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
