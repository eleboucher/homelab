---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gotosocial
spec:
  components:
    - ../../../../components/postgres/cert
    - ../../../../components/kopiur/hot
    - ../../../../components/oidc
  dependsOn:
    - name: cnpg-cluster
      namespace: database
    - name: kanidm
      namespace: security
    - name: kopiur-repository
      namespace: kopiur-system
    - name: openebs
      namespace: openebs-system
  interval: 1h
  path: ./kubernetes/apps/selfhosted/gotosocial/server
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: selfhosted
      SUBDOMAIN: gts
      OIDC_CALLBACK: /auth/callback
      OIDC_DISABLE_PKCE: "true"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app phanpy
spec:
  interval: 1h
  path: ./kubernetes/apps/selfhosted/gotosocial/phanpy
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
  dependsOn:
    - name: kopiur-repository
      namespace: kopiur-system
