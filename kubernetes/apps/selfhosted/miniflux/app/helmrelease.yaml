---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miniflux
spec:
  chartRef:
    kind: OCIRepository
    name: miniflux
  interval: 1h
  values:
    controllers:
      miniflux:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image: &minifluxImage
              repository: ghcr.io/miniflux/miniflux
              tag: 2.3.0-distroless@sha256:3a95fd1f9f75eb55b880004aee4084bb94ad60d8349de302e0b86f8620612311
            env:
              BASE_URL: https://rss.erwanleboucher.dev
              CREATE_ADMIN: "1"
              DISABLE_LOCAL_AUTH: "1"
              DISABLE_SCHEDULER_SERVICE: "1"
              RUN_MIGRATIONS: "1"
              OAUTH2_PROVIDER: oidc
              OAUTH2_REDIRECT_URL: https://rss.erwanleboucher.dev/oauth2/oidc/callback
              OAUTH2_OIDC_DISCOVERY_ENDPOINT: https://idm.erwanleboucher.dev/oauth2/openid/miniflux
              OAUTH2_OIDC_PROVIDER_NAME: kanidm
              OAUTH2_USER_CREATION: "1"
              TZ: Europe/Paris
              OAUTH2_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: kanidm-miniflux-oidc
                    key: client-id
              OAUTH2_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: kanidm-miniflux-oidc
                    key: client-secret
              DATABASE_URL: &dbUrl
                valueFrom:
                  secretKeyRef:
                    name: miniflux-postgres
                    key: url
            envFrom:
              - secretRef:
                  name: miniflux
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
            securityContext: &restrictedSecurity
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
      refresh:
        type: cronjob
        cronjob: &cronDefaults
          schedule: "*/15 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image: *minifluxImage
            args: ["-refresh-feeds"]
            env: &cronEnv
              RUN_MIGRATIONS: "1"
              TZ: Europe/Paris
              DATABASE_URL: *dbUrl
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext: *restrictedSecurity
      cleanup:
        type: cronjob
        cronjob:
          <<: *cronDefaults
          schedule: "0 4 * * *"
        containers:
          app:
            image: *minifluxImage
            args: ["-run-cleanup-tasks"]
            env: *cronEnv
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext: *restrictedSecurity
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: &port 8080
    route:
      app:
        hostnames:
          - rss.erwanleboucher.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
