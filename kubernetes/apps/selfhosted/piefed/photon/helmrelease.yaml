---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: photon
spec:
  chartRef:
    kind: OCIRepository
    name: photon
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      photon:
        containers:
          app:
            image:
              repository: ghcr.io/xyphyn/photon
              tag: v2.4.1@sha256:f609f5f69cdec3ea4b0347cef860cf1d217808cec241ce2f2f4d10a9540a3d23
            env:
              PUBLIC_INSTANCE_URL: piefed.erwanleboucher.dev
              PUBLIC_INSTANCE_TYPE: piefedalpha
              PUBLIC_SSR_ENABLED: false
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 56Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    route:
      app:
        parentRefs:
          - name: envoy-external
            namespace: network
        hostnames:
          - photon.erwanleboucher.dev
    service:
      app:
        controller: photon
        ports:
          http:
            port: 3000
