---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: piefed-dragonfly
spec:
  replicas: 1
  args:
    # maxmemory bounds only the dataset; keep it well below the container
    # limit so Dragonfly's process overhead (buffers, snapshots, fragmentation)
    # fits under the cgroup ceiling instead of getting OOMKilled on bursts.
    - --maxmemory=256Mi
    - --cache_mode=true
    - --proactor_threads=1
    - --default_lua_flags=allow-undeclared-keys
  networkPolicyEnabled: false
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 384Mi
  labels:
    role: master
