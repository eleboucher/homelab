# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app piefed
spec:
  components:
    - ../../../../components/anubis
    - ../../../../components/postgres/pass
    - ../../../../components/volsync/hot
  dependsOn:
    - name: cnpg-cluster
      namespace: database
    - name: dragonfly-operator
      namespace: dragonfly-system
    - name: openebs
      namespace: openebs-system
  healthCheckExprs:
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'ready'
      current: status.phase == 'ready'
  interval: 1h
  path: ./kubernetes/apps/selfhosted/piefed/app
  postBuild:
    substitute:
      APP: *app
      ANUBIS_TARGET: http://piefed.selfhosted.svc:5000
      APP_NAMESPACE: selfhosted
      VOLSYNC_CAPACITY: 20Gi
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"
      VOLSYNC_STORAGECLASS: homefs-replicated
      VOLSYNC_SNAPSHOTCLASS: homefs-snap
  patches:
    # backups frozen until the DRBD listener use-after-free fix ships
    # (siderolabs/talos#12968): every volsync run snapshots+clones a DRBD
    # volume, which can crash the node
    - patch: |
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationSource
        metadata:
          name: piefed
        spec:
          trigger:
            schedule: "20 4 1 1 *"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: photon
spec:
  dependsOn:
    - name: piefed
      namespace: selfhosted
  interval: 1h
  path: ./kubernetes/apps/selfhosted/piefed/photon
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
