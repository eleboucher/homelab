---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sparkyfitness
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: sparkyfitness
  components:
    - ../../../../components/kopiur/hot
    - ../../../../components/postgres/pass
  dependsOn:
    - name: cnpg-cluster
      namespace: database
    - name: kopiur-repository
      namespace: kopiur-system
    - name: openebs
      namespace: openebs-system
  interval: 1h
  path: "./kubernetes/apps/selfhosted/sparkyfitness/server"
  postBuild:
    substitute:
      APP: sparkyfitness
      APP_NAMESPACE: selfhosted
      APP_UID: "1000"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sparkyfitness-frontend
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: sparkyfitness
  dependsOn:
    - name: kopiur-repository
      namespace: kopiur-system
    - name: sparkyfitness
  interval: 1h
  path: "./kubernetes/apps/selfhosted/sparkyfitness/app"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
