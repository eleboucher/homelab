---
# yaml-language-server: $schema=https://k8s-schemas.erwanleboucher.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness-frontend
spec:
  chartRef:
    kind: OCIRepository
    name: sparkyfitness-frontend
  interval: 30m
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              # renovate: datasource=docker depName=ghcr.io/codewithcj/sparkyfitness-frontend
              repository: ghcr.io/codewithcj/sparkyfitness-frontend
              tag: v0.16.5.6@sha256:470bd6541c0795474f5ba1abeddba6a50905c2b970b78a8a12996474a6d89afa
            env:
              PROMETHEUS_ENABLED: "true"
              SPARKY_FITNESS_LOG_LEVEL: debug
              SPARKY_FITNESS_SERVER_HOST: sparkyfitness.selfhosted
              SPARKY_FITNESS_SERVER_PORT: 3010
            resources:
              requests:
                cpu: 15m
                memory: 64M
              limits:
                memory: 64M
    service:
      app:
        controller: main
        ports:
          http:
            port: 80

    route:
      app:
        hostnames:
          - fitness.erwanleboucher.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
