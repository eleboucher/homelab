---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness
spec:
  chartRef:
    kind: OCIRepository
    name: sparkyfitness
  interval: 30m
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    controllers:
      main:
        forceRename: sparkyfitness
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/codewithcj/sparkyfitness-server
              repository: ghcr.io/codewithcj/sparkyfitness-server
              tag: v0.16.6.1@sha256:5710eba08e2fcbd1718f74dfcf72273a8d7e7dab3fe49c87bbab23e9d2b08c6f
            env:
              # Configure application
              SPARKY_FITNESS_DB_NAME: sparkyfitness
              SPARKY_FITNESS_DB_USER: sparkyfitness
              SPARKY_FITNESS_DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: sparkyfitness-postgres
                    key: password
              SPARKY_FITNESS_APP_DB_USER: sparkyfitness
              SPARKY_FITNESS_APP_DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: sparkyfitness-postgres
                    key: password
              SPARKY_FITNESS_DB_HOST: postgres-rw.database.svc
              SPARKY_FITNESS_FRONTEND_URL: fitness.erwanleboucher.dev
              SPARKY_FITNESS_DISABLE_SIGNUP: false
              NODE_ENV: "production"
              TZ: "Europe/Paris"
              SERVER_UPLOADS_PATH: /uploads
            envFrom:
              - secretRef:
                  name: sparkyfitness-secrets
            resources:
              requests:
                cpu: 20m
                memory: 384Mi
              limits:
                memory: 768Mi
          mcp:
            image:
              # renovate: datasource=docker depName=docker.io/codewithcj/sparkyfitness_mcp
              repository: docker.io/codewithcj/sparkyfitness_mcp
              tag: dev@sha256:8cd75265415714fa2bef1819105459dd8b12536131f6c9f6831b233df8874997
            env:
              MCP_TRANSPORT: http
              SPARKY_FITNESS_MCP_PORT: "3001"
              SPARKY_FITNESS_DB_HOST: postgres-rw.database.svc
              SPARKY_FITNESS_DB_PORT: "5432"
              SPARKY_FITNESS_DB_NAME: sparkyfitness
              SPARKY_FITNESS_DB_USER: sparkyfitness
              SPARKY_FITNESS_DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: sparkyfitness-postgres
                    key: password
              SPARKY_FITNESS_SERVER_HOST: sparkyfitness.selfhosted.svc.cluster.local
              SPARKY_FITNESS_SERVER_PORT: "3010"
              TZ: "Europe/Paris"
            envFrom:
              - secretRef:
                  name: sparkyfitness-secrets
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 3010
      mcp:
        controller: main
        ports:
          http:
            port: 3001
    route:
      mcp:
        hostnames:
          - sparkyfitness-mcp.erwanleboucher.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: mcp
                port: 3001
    persistence:
      uploads:
        type: persistentVolumeClaim
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/SparkyFitnessServer/uploads

      backup:
        accessMode: ReadWriteOnce
        size: 15Gi
        storageClass: ceph-block
        globalMounts:
          - path: /app/SparkyFitnessServer/backup
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /app/SparkyFitnessServer/temp_uploads
            subPath: temp_uploads
