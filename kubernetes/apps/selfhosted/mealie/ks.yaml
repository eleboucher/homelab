---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mealie
spec:
  components:
    - ../../../../components/oidc
    - ../../../../components/postgres/cert
    - ../../../../components/kopiur/hot
    - ../../../../components/keda-http
  dependsOn:
    - name: cnpg-cluster
      namespace: database
    - name: kanidm
      namespace: security
    - name: keda-http-add-on
      namespace: observability
    - name: kopiur-repository
      namespace: kopiur-system
    - name: openebs
      namespace: openebs-system
  interval: 1h
  path: ./kubernetes/apps/selfhosted/mealie/app
  postBuild:
    substitute:
      APP: *app
      APP_NAMESPACE: selfhosted
      HTTP_SCALER_PORT: "9000"
      OIDC_CALLBACK: /login
      OIDC_DISPLAY_NAME: Mealie
      OIDC_LEGACY_CRYPTO: "true"
      OIDC_SHORT_USERNAME: "true"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: selfhosted
  timeout: 5m
  wait: false
