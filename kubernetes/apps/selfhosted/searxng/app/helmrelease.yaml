---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng
spec:
  chartRef:
    kind: OCIRepository
    name: searxng
  interval: 30m
  values:
    configMaps:
      config:
        suffix: config
        data:
          limiter.toml: |-
            [real_ip]
            x_for = 1
            ipv4_prefix = 32
            ipv6_prefix = 48

            [botdetection.ip_limit]
            filter_link_local = true
            link_token = false

            [botdetection.ip_lists]
            block_ip = []

            pass_ip = [
              '192.168.0.0/16',
              '10.0.0.0/8',
            ]

            pass_searxng_org = false
          settings.yml: |-
            ---
            use_default_settings: true

            server:
              limiter: true
              image_proxy: true
              method: GET # https://github.com/searxng/searxng/pull/3619
              public_instance: false

            search:
              autocomplete: duckduckgo
              favicon_resolver: duckduckgo
              languages:
                - all
                - en
                - en-US
              formats:
                - html
                - json

            general:
              instance_name: Home Search

            ui:
              default_theme: simple
              infinite_scroll: true
              query_in_title: true
              results_on_new_tab: true
              static_use_hash: true
              theme_args:
                simple_style: auto

            categories_as_tabs:
              general:
              images:
              videos:
              map:

            enabled_plugins:
              - Basic Calculator
              - Hash plugin
              - Open Access DOI rewrite
              - Self Informations
              - Tracker URL remover
              - Unit converter plugin

            hostnames:
              high_priority:
                - (.*)\/blog\/(.*)
                - (.*\.)?wikipedia.org$
                - (.*\.)?github.com$
                - (.*\.)?reddit.com$
                - (.*\.)?docker.com$
                - (.*\.)?archlinux.org$
                - (.*\.)?stackoverflow.com$
                - (.*\.)?askubuntu.com$
                - (.*\.)?superuser.com$
    controllers:
      searxng:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 2
        strategy: RollingUpdate
        pod:
          securityContext:
            fsGroup: 977
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 977
            runAsUser: 977
        containers:
          main:
            image:
              repository: ghcr.io/searxng/searxng
              tag: 2026.5.16-dce3bb69b@sha256:654eff5a61e7a768b233b89da64ba71904d06c67c2f43fb31ab5ce20b6f1e44c
            env:
              SEARXNG_BASE_URL: https://search.erwanleboucher.dev
              SEARXNG_PORT: &httpPort 8080
              SEARXNG_VALKEY_URL: "redis://dragonfly.database.svc:6379"
            envFrom:
              - secretRef:
                  name: searxng-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /stats
                    port: *httpPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 384Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - CHOWN
                  - DAC_OVERRIDE
                  - SETGID
                  - SETUID
                drop:
                  - ALL
              readOnlyRootFilesystem: true
    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /etc/searxng/limiter.toml
            subPath: limiter.toml
            readOnly: true
          - path: /etc/searxng/settings.yml
            subPath: settings.yml
            readOnly: true
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /tmp
    route:
      app:
        hostnames:
          - search.erwanleboucher.dev
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        controller: searxng
        ports:
          http:
            port: *httpPort
