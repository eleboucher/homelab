---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: codeberg
spec:
  provider:
    name: forgejo
    endpoint: https://codeberg.org/api/v1
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
    - name: RENOVATE_REDIS_URL
      value: "redis://dragonfly.database.svc:6379/3"
  image: ghcr.io/renovatebot/renovate:43.101.1
  parallelism: 3
  resources:
    requests:
      cpu: 500m
      memory: 128Mi
    limits:
      cpu: "2"
  schedule: 0 * * * *
  secretRef: renovate-codeberg-secret
