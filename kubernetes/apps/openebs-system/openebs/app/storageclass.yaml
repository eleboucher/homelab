---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/storage.k8s.io/storageclass_v1.json
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: openebs-zfs
provisioner: zfs.csi.openebs.io
allowVolumeExpansion: true
parameters:
  compression: "zstd"
  dedup: "off"
  fstype: "zfs"
  poolname: "data-pool"
  shared: "yes"
  recordsize: "16k"
