---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/databaserole_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: postgres-pooler-rw
spec:
  cluster:
    name: postgres
  databaseRoleReclaimPolicy: retain
  disablePassword: true
  ensure: present
  login: true
  name: pooler-rw
  superuser: false
