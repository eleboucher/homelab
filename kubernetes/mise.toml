[tasks."view-secret"]
description = "View a secret"
quiet = true
usage = '''
arg "<namespace>"
arg "<secret>"
'''
run = '''
kubectl view-secret -n "$usage_namespace" "$usage_secret"
'''

[tasks."render-local-ks"]
description = "Render a Flux Kustomization locally (internal helper)"
hide = true
quiet = true
usage = '''
arg "<ns>"
arg "<ks>"
'''
run = '''
flux-local build ks --namespace "$usage_ns" --sources "flux-system=." --path flux/cluster "$usage_ks"
'''
