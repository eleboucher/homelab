[tasks."apply-ks"]
description = "Apply local Flux Kustomization"
quiet = true
usage = '''
arg "<ns>"
arg "<ks>"
'''
run = '''
mise run //kubernetes:render-local-ks "$usage_ns" "$usage_ks" | kubectl apply --server-side --force-conflicts --field-manager=kustomize-controller -f -
'''

[tasks."browse-pvc"]
description = "Browse a PVC"
quiet = true
usage = '''
arg "<namespace>"
arg "<claim>"
'''
run = '''
kubectl run -n "$usage_namespace" "browse-pvc-$usage_claim" -it --rm --restart=Never \
    --image=mirror.gcr.io/alpine:latest \
    --overrides='{"spec":{"containers":[{"name":"browse-pvc-'"$usage_claim"'","image":"mirror.gcr.io/alpine:latest","stdin":true,"tty":true,"command":["/bin/sh"],"workingDir":"/mnt","volumeMounts":[{"mountPath":"/mnt","name":"data"}]}],"volumes":[{"name":"data","persistentVolumeClaim":{"claimName":"'"$usage_claim"'"}}]}}'
'''

[tasks."delete-ks"]
description = "Delete local Flux Kustomization"
quiet = true
usage = '''
arg "<ns>"
arg "<ks>"
'''
run = '''
mise run //kubernetes:render-local-ks "$usage_ns" "$usage_ks" | kubectl delete -f -
'''

[tasks."restart-ha"]
description = "Restart Home Assistant VM (fixes Bluetooth USB passthrough)"
quiet = true
run = "kubectl virt restart home-assistant -n home-assistant"

[tasks."debug-node"]
description = "Debug a node"
quiet = true
usage = 'arg "<node>"'
run = '''
trap 'kubectl delete pod -n default -l app.kubernetes.io/managed-by=kubectl-debug --ignore-not-found --wait=false' EXIT
kubectl debug "node/$usage_node" -n default -it --image=mirror.gcr.io/alpine:latest --profile=sysadmin
'''

[tasks."restore"]
description = "Restore a PVC from VolSync, scaling the workload down"
quiet = true
usage = '''
arg "<ns>"
arg "<app>"
arg "[previous]" default="0"
'''
run = '''
flux -n "$usage_ns" suspend kustomization "$usage_app"
flux -n "$usage_ns" suspend helmrelease "$usage_app"
kubectl -n "$usage_ns" get deploy,sts -l "app.kubernetes.io/name=$usage_app" -o name \
    | xargs -r -I{} kubectl -n "$usage_ns" scale {} --replicas=0
kubectl -n "$usage_ns" wait pod --for=delete --selector="app.kubernetes.io/name=$usage_app" --timeout=5m
kubectl -n "$usage_ns" get replicationdestination "$usage_app-dst" -o json \
    | jq --arg name "$usage_app-manual" --arg pvc "$usage_app" --argjson prev "$usage_previous" \
        'del(.status)
        | .metadata = {name: $name, namespace: .metadata.namespace}
        | .spec.kopia.copyMethod = "Direct"
        | .spec.kopia.destinationPVC = $pvc
        | .spec.kopia.previous = $prev' \
    | kubectl apply --server-side -f -
kubectl -n "$usage_ns" wait "job/volsync-dst-$usage_app-manual" --for=create --timeout=120s
kubectl -n "$usage_ns" wait "job/volsync-dst-$usage_app-manual" --for=condition=complete --timeout=120m
kubectl -n "$usage_ns" delete replicationdestination "$usage_app-manual"
flux -n "$usage_ns" resume kustomization "$usage_app"
flux -n "$usage_ns" resume helmrelease "$usage_app"
flux -n "$usage_ns" reconcile helmrelease "$usage_app" --force
kubectl -n "$usage_ns" wait pod --for=condition=ready --selector="app.kubernetes.io/name=$usage_app" --timeout=5m
'''

[tasks."prune-pods"]
description = "Prune pods in Failed, Pending, or Succeeded state"
quiet = true
run = '''
for phase in Failed Pending Succeeded; do
    kubectl delete pods -A --field-selector status.phase="$phase" --ignore-not-found=true
done
'''

[tasks."sync-es"]
description = "Sync ExternalSecrets (optionally: mise run //kubernetes:sync-es <ns> <name>)"
quiet = true
usage = '''
arg "[ns]"
arg "[name]"
'''
run = '''
ns="${usage_ns:-}"
name="${usage_name:-}"
if [ -n "$ns" ] && [ -n "$name" ]; then
    kubectl -n "$ns" annotate --field-manager flux-client-side-apply --overwrite es "$name" \
        force-sync="$(date +%s)"
else
    kubectl get es --no-headers -A | while read -r ns name _; do
        kubectl -n "$ns" annotate --field-manager flux-client-side-apply --overwrite es "$name" \
            force-sync="$(date +%s)"
    done
fi
'''

[tasks."sync-git"]
description = "Sync GitRepositories"
quiet = true
run = '''
kubectl get gitrepo --no-headers -A | while read -r ns name _; do
    kubectl -n "$ns" annotate --field-manager flux-client-side-apply --overwrite gitrepo "$name" reconcile.fluxcd.io/requestedAt="$(date +%s)"
done
'''

