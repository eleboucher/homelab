[tasks."install-collections"]
description = "Install Ansible collections required for VPS playbook"
quiet = true
run = '''
ansible-galaxy collection install -r requirements.yml
'''

[tasks.install]
description = "Install Pangolin on VPS and save info to 1Password"
quiet = true
depends = [":install-collections"]
usage = 'arg "<ip>"'
run = '''
ansible-playbook -i "$usage_ip," playbook.yml
'''

[tasks."deploy-direct"]
description = "Emergency: SCP compose file to VPS and run docker compose up directly (bypasses doco-cd/git)"
quiet = true
usage = 'arg "<ip>"'
run = '''
tmpdir=$(mktemp -d)
trap "rm -rf $tmpdir" EXIT
printf '%s\n' \
    "OVH_APPLICATION_KEY=$(op read 'op://kubernetes/ovh/OVH_APPLICATION_KEY')" \
    "OVH_APPLICATION_SECRET=$(op read 'op://kubernetes/ovh/OVH_APPLICATION_SECRET')" \
    "OVH_CONSUMER_KEY=$(op read 'op://kubernetes/ovh/OVH_CONSUMER_KEY')" \
    "PANGOLIN_SECRET=$(op read 'op://kubernetes/pangolin/server_secret')" \
    "MAXMIND_ACCOUNT_ID=$(op read 'op://kubernetes/pangolin/maxmind_account_id')" \
    "MAXMIND_LICENSE_KEY=$(op read 'op://kubernetes/pangolin/maxmind_key')" \
    "CROWDSEC_API_KEY=$(op read 'op://kubernetes/pangolin/crowdsec_api_key')" \
    "ANUBIS_ED25519_PRIVATE_KEY_HEX=$(op read 'op://kubernetes/anubis/ED25519_PRIVATE_KEY_HEX')" \
    > "$tmpdir/.env"
deploy_dir="/var/lib/docker/volumes/doco-cd_data/_data/git.erwanleboucher.dev/eleboucher/homelab/docker/vps/01-pangolin"
scp "$tmpdir/.env" "$usage_ip:/tmp/.pangolin.env"
scp "$MISE_MONOREPO_ROOT/docker/vps/01-pangolin/docker-compose.yml" "$usage_ip:/tmp/pangolin-compose.yml"
ssh "$usage_ip" "sudo mv /tmp/.pangolin.env $deploy_dir/.env && sudo mv /tmp/pangolin-compose.yml $deploy_dir/docker-compose.yml && sudo bash -c \"cd $deploy_dir && docker compose down --remove-orphans && docker compose up -d\""
'''

[tasks.deploy]
description = "Trigger a doco-cd deployment via the API"
quiet = true
usage = 'arg "<ip>"'
run = '''
api_key=$(op read "op://kubernetes/doco-cd/api_secret")
ssh "$usage_ip" "curl --silent --fail --request POST \
    --url 'http://localhost:8080/v1/api/poll/run?wait=true' \
    --header 'content-type: application/json' \
    --header 'x-api-key: ${api_key}' \
    --data '[{\"url\": \"https://github.com/eleboucher/homelab.git\"}]'"
'''
