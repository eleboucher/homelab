---
endpoint: "https://registry.erwanleboucher.dev"
accountDomain: "erwanleboucher.dev"
listen: ":5000"
dataDir: "/apoci/storage"
logFormat: json

database:
  driver: postgres
  dsn: "postgres://apoci:apoci@apoci-postgres:5432/apoci?sslmode=disable"

peering:
  healthCheckInterval: 30s
  fetchTimeout: 60s

limits:
  maxBlobSize: 5368709120 # 5 GiB

gc:
  untaggedManifestAge: 1h
  orphanBatchSize: 10000
  interval: 30m
  diskUsageThreshold: 80
  diskUsageCheckInterval: 5m
  retention:
    # Non-pinned tags (sha-*): keep the 5 newest, drop those older than 2 days.
    keepLastN: 5
    maxAge: 48h
    pinnedGlobs:
      - "latest"
      - "v*"
      - "*.*.*"
    perRepo:
      - repo: "eleboucher/homelab"
        keepLastN: 7
        maxAge: 24h

metrics:
  enabled: true
  listen: ":9090"

federation:
  autoAccept: mutual
  # Globs are namespace-relative: write <user>/<repo>, no accountDomain prefix.
  excludedRepos:
    - eleboucher/agentmemory
    - "*/*-buildcache"

upstreams:
  enabled: true
  registries:
    - name: docker.io
      endpoint: "https://registry-1.docker.io"
    - name: ghcr.io
      endpoint: "https://ghcr.io"

ui:
  enabled: true
