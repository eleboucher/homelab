---
endpoint: "https://registry.erwanleboucher.dev"
accountDomain: "erwanleboucher.dev"
listen: ":5000"
dataDir: "/apoci/storage"
logFormat: json

database:
  driver: postgres
  dsn: "postgres://apoci:apoci@apoci-postgres:5432/apoci?sslmode=disable"

peering:
  healthCheckInterval: 30s
  fetchTimeout: 60s

limits:
  maxBlobSize: 5368709120 # 5 GiB

gc:
  untaggedManifestAge: 1h
  orphanBatchSize: 10000
  interval: 30m
  diskUsageThreshold: 80
  diskUsageCheckInterval: 5m
  retention:
    maxAge: 168h
    pinnedGlobs:
      - "v*"
      - "*.*.*"
    perRepo:
      - repo: "erwanleboucher.dev/eleboucher/homelab"
        keepLastN: 7
        maxAge: 24h

metrics:
  enabled: true
  listen: ":9090"

federation:
  autoAccept: mutual
  excludedRepos:
    # Repos are stored namespace-prefixed (accountDomain/<user>/<repo>), so globs
    # must account for that leading segment — path.Match's '*' never crosses '/'.
    - erwanleboucher.dev/eleboucher/agentmemory
    - "*/*/*-buildcache"
    - "*/*-buildcache"

upstreams:
  enabled: true
  registries:
    - name: docker.io
      endpoint: "https://registry-1.docker.io"
    - name: ghcr.io
      endpoint: "https://ghcr.io"

ui:
  enabled: true
