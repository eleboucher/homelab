---
name: registry

services:
  apoci:
    # renovate: datasource=docker depName=registry.mortebrume.eu/erwanleboucher.dev/eleboucher/apoci
    image: registry.mortebrume.eu/erwanleboucher.dev/eleboucher/apoci:0.0.50
    container_name: apoci
    restart: unless-stopped
    user: "1000:1000"
    labels:
      - prometheus.scrape=true
      - prometheus.port=9090
      - prometheus.job=apoci
    depends_on:
      apoci-postgres:
        condition: service_healthy
    volumes:
      - /opt/apoci/data:/apoci/storage
    configs:
      - source: apoci_config
        target: /apoci/config/apoci.yaml
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - --spider
        - http://localhost:5000/healthz
      interval: 10s
      timeout: 5s
      retries: 3
  apoci-postgres:
    # renovate: datasource=docker depName=postgres
    image: docker.io/library/postgres:18-alpine
    container_name: apoci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: apoci
      POSTGRES_PASSWORD: apoci
      POSTGRES_DB: apoci
    volumes:
      - /opt/apoci/postgres-root:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U apoci
      interval: 5s
      timeout: 3s
      retries: 5

  apoci-postgres-backup:
    # renovate: datasource=docker depName=ghcr.io/itbm/postgresql-backup-s3
    image: ghcr.io/itbm/postgresql-backup-s3:1.2.3
    container_name: apoci-postgres-backup
    restart: unless-stopped
    depends_on:
      apoci-postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: apoci-postgres
      POSTGRES_DATABASE: apoci
      POSTGRES_USER: apoci
      POSTGRES_PASSWORD: apoci
      S3_ENDPOINT: ${OVH_S3_ENDPOINT}
      S3_BUCKET: homelab-postgres
      S3_PREFIX: apoci
      S3_ACCESS_KEY_ID: ${OVH_S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${OVH_S3_SECRET_ACCESS_KEY}
      S3_S3V4: "yes"
      SCHEDULE: "0 */6 * * *"
      DELETE_OLDER_THAN: "30 days ago"

configs:
  # Inlined (not file:) so doco-cd can interpolate ${GHCR_TOKEN} from 1Password
  # into the replication target. configs.file: content is not interpolated.
  apoci_config:
    content: |
      ---
      endpoint: "https://registry.erwanleboucher.dev"
      accountDomain: "erwanleboucher.dev"
      listen: ":5000"
      dataDir: "/apoci/storage"
      logFormat: json

      database:
        driver: postgres
        dsn: "postgres://apoci:apoci@apoci-postgres:5432/apoci?sslmode=disable"

      peering:
        healthCheckInterval: 30s
        fetchTimeout: 60s

      limits:
        maxBlobSize: 5368709120 # 5 GiB

      gc:
        untaggedManifestAge: 168h
        orphanBatchSize: 10000
        interval: 30m
        diskUsageThreshold: 80
        diskUsageCheckInterval: 5m
        retention:
          # Retention is origin-blind (sweeps peer repos too); keep the global
          # default off so federated mirrors survive. Aggressive policy is scoped
          # per-repo to repos we own.
          keepLastN: 0
          maxAge: 0
          pinnedGlobs:
            - "latest"
            - "v*"
            - "*.*.*"
          perRepo:
            - repo: "eleboucher/homelab"
              keepLastN: 7
              maxAge: 24h

      metrics:
        enabled: true
        listen: ":9090"

      federation:
        autoAccept: mutual
        # Globs are namespace-relative: write <user>/<repo>, no accountDomain prefix.
        excludedRepos:
          - eleboucher/agentmemory
          - "*/*-buildcache"

      upstreams:
        enabled: true
        registries:
          - name: docker.io
            endpoint: "https://registry-1.docker.io"
          - name: ghcr.io
            endpoint: "https://ghcr.io"

      # Mirror everything pushed here out to GHCR as it arrives. Replication sees
      # the full repo path (erwanleboucher.dev/eleboucher/<repo>); strip the domain
      # so it lands at ghcr.io/eleboucher/<repo>. Token from 1Password via doco-cd.
      replication:
        enabled: true
        timeout: 5m
        targets:
          - name: ghcr
            endpoint: "https://ghcr.io"
            auth: token
            username: eleboucher
            password: "${GHCR_TOKEN}"
            stripPrefix: "erwanleboucher.dev/"

      ui:
        enabled: true

networks:
  default:
    name: edge
    external: true
