---
name: tunnel

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  towonel-hub:
    # renovate: datasource=docker depName=git.erwanleboucher.dev/eleboucher/towonel-node
    image: registry.mortebrume.eu/erwanleboucher.dev/eleboucher/towonel-node
    container_name: towonel-hub
    restart: unless-stopped
    user: "10001:10001"
    environment:
      RUST_LOG: info
      TOWONEL_INVITE_HASH_KEY: ${TOWONEL_INVITE_HASH_KEY}
      TOWONEL_HUB_PUBLIC_URL: https://towonel.erwanleboucher.dev
      TOWONEL_EDGE_TLS_ACME_EMAIL: ${TOWONEL_ACME_EMAIL}
      # Edge DNS differs from hub DNS, so override the derived default:
      TOWONEL_EDGE_ADVERTISED_ADDRESSES: tunnel.erwanleboucher.dev:443
      # Behind a reverse proxy on :443 — these stay non-default:
      TOWONEL_EDGE_LISTEN_ADDR: 0.0.0.0:4443
      TOWONEL_EDGE_HEALTH_LISTEN_ADDR: 0.0.0.0:9092
      TOWONEL_EDGE_PROXY_PROTOCOL: "true"
      TOWONEL_EDGE_TLS_HTTP_LISTEN_ADDR: 0.0.0.0:8081
    expose:
      - "4443"
      - "8081"
    ports:
      - "2222:2222"
      - "22222:22222"
      - "3478:3478/udp"
      - "5349:5349/tcp"
    volumes:
      - /opt/towonel:/data
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "-o"
        - "/dev/null"
        - "http://127.0.0.1:8443/v1/health"
      interval: 30s
      timeout: 5s
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    logging: *default-logging
networks:
  default:
    name: edge
    external: true
