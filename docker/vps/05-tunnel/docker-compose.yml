name: tunnel
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
services:
  towonel-hub:
    # renovate: datasource=docker depName=registry.erwanleboucher.dev/eleboucher/towonel-node
    image: codeberg.org/towonel/towonel-node:0.1.24
    container_name: towonel-hub
    restart: unless-stopped
    user: "10001:10001"
    environment:
      RUST_LOG: info
      TOWONEL_HUB_ENABLED: "true"
      TOWONEL_HUB_ALLOW_PRIVILEGED_PORTS: "true"
      TOWONEL_INVITE_HASH_KEY: ${TOWONEL_INVITE_HASH_KEY}
      TOWONEL_HUB_PUBLIC_URL: https://towonel.erwanleboucher.dev
      # Edge DNS differs from hub DNS, so override the derived default:
      TOWONEL_EDGE_ENABLED: "true"
      TOWONEL_EDGE_HEALTH_LISTEN_ADDR: 0.0.0.0:9092
      TOWONEL_EDGE_IROH_PORT: "51820"
      TOWONEL_EDGE_LISTEN_ADDR: 0.0.0.0:4443
      TOWONEL_EDGE_PROXY_PROTOCOL: "true"
    expose:
      - "4443"
      - "8443"
    ports:
      - "2222:2222"
      - "22222:22222"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "51820:51820/udp"
    volumes:
      - /opt/towonel:/data
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "-o"
        - "/dev/null"
        - "http://127.0.0.1:8443/v1/health"
      interval: 30s
      timeout: 5s
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    logging: *default-logging
networks:
  default:
    name: edge
    external: true
