---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Labeler

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORGEJO_API_URL: ${{ forgejo.server_url }}
          REPO: ${{ forgejo.repository }}
        run: |
          set -e
          for label in area/ansible area/bootstrap area/ci area/docker area/kubernetes area/renovate area/talos; do
            status=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: token $GH_TOKEN" \
              "$FORGEJO_API_URL/api/v1/repos/$REPO/labels?name=$(printf '%s' "$label" | jq -sRr @uri)")
            if [ "$status" = "200" ]; then
              echo "exists: $label"
              continue
            fi
            echo "creating: $label"
            curl -sf -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"$label\", \"color\": \"#ededed\", \"description\": \"Auto-created by labeler workflow\"}" \
              "$FORGEJO_API_URL/api/v1/repos/$REPO/labels"
            echo
          done

      - name: Labeler
        uses: https://github.com/actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          configuration-path: .forgejo/labeler.yaml
