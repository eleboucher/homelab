---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: AI PR Review

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.pull_request.number || forgejo.ref }}${{ forgejo.event.action == 'labeled' && format('-label-{0}', forgejo.run_id) || '' }}
  cancel-in-progress: true

jobs:
  review:
    name: AI PR Review
    if: ${{ !forgejo.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: https://github.com/actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ forgejo.event.pull_request.head.sha }}

      - name: Install gh CLI
        # The action's preflight requires `gh` on PATH even on Forgejo
        # (core review uses curl, but the preflight check is unconditional).
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          apt-get install -y gh

      - name: AI PR Review
        uses: https://github.com/misospace/pr-reviewer-action@75d38fbc0a6098eb253a9c8a2c28ad1c20f268fb # v2.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          platform: forgejo
          forgejo_api_url: https://git.erwanleboucher.dev/
          forgejo_token: ${{ secrets.GITHUB_TOKEN }}
          ai_base_url: https://litellm.erwanleboucher.dev/v1
          ai_api_format: anthropic
          ai_model: MiniMax-M3
          ai_api_key: ${{ secrets.LITELLM_API_KEY }}
          ai_max_tokens: "16000"
          ai_primary_retries: "2"
          ai_primary_retry_delay_sec: "5"
          ai_connect_timeout_sec: "10"
          ai_fallback_base_url: https://litellm.erwanleboucher.dev/v1
          ai_fallback_api_format: openai
          ai_fallback_model: neuralwatt-qwen3-6-35b
          ai_fallback_api_key: ${{ secrets.LITELLM_API_KEY }}
          on_model_failure: notice
          tool_mode: native_loop
          tool_max_requests: "4"
          tool_max_rounds: "2"
          tool_loop_wall_clock_sec: "180"
          tool_request_timeout_sec: "15"
          tool_max_response_bytes: "12000"
          tool_planning_timeout_sec: "60"
          tool_planning_max_context_bytes: "30000"
          tool_planning_max_tokens: "8000"
          tool_allowed_gh_api_repos: "eleboucher/homelab"
          tool_enable_for_forks: "false"
          tool_mcp_servers: "tools=https://mcp-internal.erwanleboucher.dev/mcp"
          publish_review_comment: "true"

      - name: Debug forgejo publish
        if: always()
        env:
          GITHUB_ACTION_PATH: ${{ github.action_path }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORGEJO_API_URL: https://git.erwanleboucher.dev/
          REPO: ${{ forgejo.repository }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
        run: |
          set +e
          export PYTHONPATH="$GITHUB_ACTION_PATH${PYTHONPATH:+:$PYTHONPATH}"
          echo "=== env ==="
          echo "GITHUB_ACTION_PATH=$GITHUB_ACTION_PATH"
          echo "FORGEJO_API_URL=$FORGEJO_API_URL"
          echo "REPO=$REPO  PR_NUMBER=$PR_NUMBER"
          echo
          echo "=== 1. list-comments (read probe) ==="
          python3 -m pr_reviewer.forgejo_backend list-comments "$REPO" "$PR_NUMBER" 2>&1 | head -30
          echo "exit=$?"
          echo
          echo "=== 2. create-comment with test body (write probe) ==="
          body='<!-- ai-pr-reviewer-debug -->\ndebug probe from workflow'
          python3 -m pr_reviewer.forgejo_backend create-comment "$REPO" "$PR_NUMBER" "$body" 2>&1 | head -30
          echo "exit=$?"
          echo
          echo "=== 3. Raw curl to same endpoint (no python wrapper) ==="
          curl -sS -X POST -o - -w "\nhttp_status=%{http_code}\n" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"<!-- ai-pr-reviewer-debug -->\nraw curl probe\"}" \
            "$FORGEJO_API_URL/api/v1/repos/$REPO/issues/$PR_NUMBER/comments" 2>&1 | head -30
          echo "curl_exit=$?"
