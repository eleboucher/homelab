---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Konflate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  KONFLATE_DOMAIN: konflate.erwanleboucher.dev

jobs:
  comment:
    name: Konflate - Comment
    runs-on: ubuntu-latest
    steps:
      - name: Fetch rendered summary
        id: fetch
        env:
          PR: ${{ forgejo.event.pull_request.number }}
        run: |
          if status="$(curl -fsS --retry 10 --retry-delay 3 --retry-all-errors \
               -H 'Accept: text/markdown' \
               -o summary.md -w '%header{x-konflate-render-status}' \
               "https://${KONFLATE_DOMAIN}/api/prs/${PR}/summary")" \
             && [ -s summary.md ]; then
            {
              echo "ready=true"
              echo "status=${status}"
            } >> "${FORGEJO_OUTPUT}"
          else
            echo "ready=false" >> "${FORGEJO_OUTPUT}"
            echo "konflate summary unavailable or empty — skipping; next push retries."
          fi

      - name: Add Comment
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.BOTOWL_TOKEN }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
          MARKER: "<!-- konflate"
        run: |-
          BODY_JSON=$(jq -Rs '{"body": .}' < summary.md)

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" '.[] | select(.body | contains($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi

      - name: Fail on render issue
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        env:
          STATUS: ${{ steps.fetch.outputs.status }}
        run: |
          case "$STATUS" in
            ok)        echo "konflate render: ok" ;;
            failures)  echo "::error::konflate render: one or more resources failed to render"; exit 1 ;;
            error)     echo "::error::konflate render: render errored (no diff)"; exit 1 ;;
            *)         echo "::warning::konflate render: unexpected status '${STATUS}'" ;;
          esac
