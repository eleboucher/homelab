---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile
bases:
  - defaults.yaml

helmDefaults:
  cleanupOnFail: true
  forceConflicts: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    inherit:
      - template: default
    hooks:
      - # Wait for CRDs to be available
        command: kubectl
        args:
          - wait
          - --for=create
          - crd/ciliumbgpadvertisements.cilium.io
          - crd/ciliumbgpclusterconfigs.cilium.io
          - crd/ciliumbgppeerconfigs.cilium.io
          - crd/ciliumloadbalancerippools.cilium.io
          - --timeout=2m
        events:
          - postsync
        showlogs: true
      - # Apply Resources
        command: kubectl
        args:
          - apply
          - --namespace={{ .Release.Namespace }}
          - --server-side
          - --force-conflicts
          - --filename=../../kubernetes/apps/{{ .Release.Namespace }}/{{ .Release.Name }}/app/networks.yaml
        events:
          - postsync
        showlogs: true

  - name: coredns
    namespace: kube-system
    inherit:
      - template: default
    needs:
      - kube-system/cilium

  - name: spegel
    namespace: kube-system
    inherit:
      - template: default
    needs:
      - kube-system/coredns
    # Spegel is p2p and never becomes Ready on a single-node cluster; don't block bootstrap on it
    wait: false
    waitForJobs: false

  - name: cert-manager
    namespace: cert-manager
    inherit:
      - template: default
    hooks:
      - # Apply ClusterIssuers after cert-manager is ready
        command: bash
        args:
          - -c
          - |
            # Wait for cert-manager CRDs
            echo "Waiting for cert-manager CRDs..."
            until kubectl get crd certificates.cert-manager.io clusterissuers.cert-manager.io &>/dev/null; do
              echo "Waiting for CRDs..."
              sleep 2
            done
            # Wait for cert-manager webhook to be ready
            echo "Waiting for cert-manager webhook..."
            kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s
            # Apply ClusterIssuers
            echo "Applying ClusterIssuers..."
            kubectl apply -f ../../kubernetes/apps/cert-manager/cert-manager/app/selfsigned.yaml
            # Wait for internal-ca certificate to be ready
            echo "Waiting for internal-ca certificate..."
            kubectl wait --for=condition=Ready certificate/internal-ca -n cert-manager --timeout=120s
            echo "ClusterIssuers ready!"
        events:
          - postsync
        showlogs: true
    needs:
      - kube-system/spegel

  - name: external-secrets
    namespace: security
    inherit:
      - template: default
    needs:
      - cert-manager/cert-manager

  - name: onepassword
    namespace: security
    inherit:
      - template: default
    needs:
      - security/external-secrets
    # Mirror the Flux postRenderers from the HelmRelease (helmfile doesn't apply them):
    # inject credentials via envFrom instead of the op-credentials file volume.
    jsonPatches:
      - target:
          group: apps
          version: v1
          kind: Deployment
          name: onepassword-connect
        patch:
          - op: remove
            path: /spec/template/spec/containers/0/env/0
          - op: remove
            path: /spec/template/spec/containers/1/env/1
          - op: add
            path: /spec/template/spec/containers/0/envFrom
            value:
              - secretRef:
                  name: onepassword-credentials-secret
          - op: add
            path: /spec/template/spec/containers/1/envFrom
            value:
              - secretRef:
                  name: onepassword-credentials-secret
          - op: remove
            path: /spec/template/spec/containers/0/volumeMounts/1
          - op: remove
            path: /spec/template/spec/containers/1/volumeMounts/1
          - op: remove
            path: /spec/template/spec/volumes/1
    hooks:
      - # Apply ClusterSecretStore
        command: kubectl
        args:
          - apply
          - --server-side
          - --field-manager=kustomize-controller
          - --filename=../../kubernetes/apps/security/onepassword/app/clustersecretstore.yaml
        events:
          - postsync
        showlogs: true

  - name: flux-operator
    namespace: flux-system
    inherit:
      - template: default
    needs:
      - cert-manager/cert-manager

  - name: flux-instance
    namespace: flux-system
    inherit:
      - template: default
    needs:
      - flux-system/flux-operator
