[tasks.init]
description = "Initialize the working directory and download providers"
quiet = true
usage = 'arg "[args]" var=#true'
run = '''
eval "set -- ${usage_args:-}"
op run --env-file=op.env -- tofu init "$@"
'''

[tasks.fmt]
description = "Format all .tf files"
quiet = true
usage = 'arg "[args]" var=#true'
run = '''
eval "set -- ${usage_args:-}"
tofu fmt -recursive "$@"
'''

[tasks.validate]
description = "Validate the configuration"
quiet = true
run = '''
op run --env-file=op.env -- tofu validate
'''

[tasks.plan]
description = "Show planned changes; writes plan.tfplan"
quiet = true
usage = 'arg "[args]" var=#true'
run = '''
eval "set -- ${usage_args:-}"
op run --env-file=op.env -- tofu plan -out=plan.tfplan "$@"
'''

[tasks.apply]
description = "Apply the saved plan"
quiet = true
usage = 'arg "[args]" var=#true'
run = '''
eval "set -- ${usage_args:-}"
op run --env-file=op.env -- tofu apply "$@"
'''

[tasks.show]
description = "Show current state or a resource (read-only)"
quiet = true
usage = 'arg "[args]" var=#true'
run = '''
eval "set -- ${usage_args:-}"
op run --env-file=op.env -- tofu show "$@"
'''

[tasks.shell]
description = "Drop into an env-populated shell for ad-hoc tofu/router commands"
quiet = true
run = '''
op run --env-file=op.env -- bash
'''

[tasks.refresh]
description = "Refresh state from the router (read-only)"
quiet = true
run = '''
op run --env-file=op.env -- tofu apply -refresh-only
'''

[tasks.run]
description = "Pass-through any tofu subcommand, e.g. mise run //tofu/mikrotik:run state list"
quiet = true
usage = 'arg "[args]" var=#true'
run = '''
eval "set -- ${usage_args:-}"
op run --env-file=op.env -- tofu "$@"
'''
