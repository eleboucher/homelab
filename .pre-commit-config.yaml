---
repos:
  - repo: local
    hooks:
      - id: yaml-schema-check
        name: YAML Schema Validation
        entry: kubeconform -strict -ignore-missing-schemas -schema-location "https://k8s-schemas.home-operations.com/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
        language: system
        files: ^kubernetes/.+\.ya?ml$
        # discord-alert.yaml uses flux-operator-extended event sources (FluxInstance,
        # ResourceSet, ResourceSetInputProvider) that the upstream notification-controller
        # CRD doesn't list in its enum. flux-operator adds them at install time via runtime
        # patches; the upstream-sourced schema can't see those, so skip just this file.
        exclude: (/config/|/resources/|kustomization\.ya?ml$|namespace\.ya?ml$|/components/|hooks.ya?ml$|/flux-instance/app/alerts/discord-alert\.ya?ml$)
      - id: yamllint
        name: YAML Lint
        entry: yamllint
        language: system
        exclude: ^config/
        files: .+\.ya?ml$
      - id: yamlfmt
        name: YAML Format
        entry: yamlfmt
        language: system
        exclude: ^config/
        files: .+\.ya?ml$
      - id: k8s-schema-hook
        name: K8s Schema Hook
        entry: hooks/k8s_yaml_schema.py --config .k8s-schema-hook.yaml
        language: python
        files: ^kubernetes/.+\.ya?ml$
        additional_dependencies:
          - jmespath
          - ruamel.yaml
      - id: tofu-fmt
        name: tofu fmt
        entry: tofu -chdir=tofu/mikrotik fmt -check -recursive
        language: system
        files: ^tofu/.+\.tf$
        pass_filenames: false
      - id: tofu-validate
        name: tofu validate
        entry: tofu -chdir=tofu/mikrotik validate
        language: system
        files: ^tofu/mikrotik/.+\.tf$
        pass_filenames: false
